<style>
/* ═══════════════════════════════════════
   CSS CUSTOM PROPERTIES (theme system)
═══════════════════════════════════════ */
:root {
  --bg:       #0f1117;
  --surface:  #1a1e2a;
  --card:     #222736;
  --border:   #2e3350;
  --text:     #eef0f8;
  --dim:      #7a80a0;
  --accent:   #f08c00;
  --green:    #3ecf6e;
  --greenDim: #1a2e1a;
  --blue:     #4a9eff;
  --blueDim:  #1e2232;
  --teal:     #00cfb4;
  --tealDim:  #003d37;
  --amber:    #ff8c00;
  --amberDim: #2e1a00;
  --red:      #ff5555;
  --warn:     #ffcc00;
  --purple:   #c084fc;
  --purpleDim:#1a0d2e;
  --gold:     #facc15;
}
.theme-light {
  --bg:       #f0f2f7;
  --surface:  #ffffff;
  --card:     #f8f9fc;
  --border:   #d0d5e8;
  --text:     #1a1e2a;
  --dim:      #6b7280;
  --accent:   #d97706;
  --green:    #16a34a;
  --greenDim: #dcfce7;
  --blue:     #2563eb;
  --blueDim:  #dbeafe;
  --teal:     #0d9488;
  --tealDim:  #ccfbf1;
  --amber:    #d97706;
  --amberDim: #fef3c7;
  --red:      #dc2626;
  --warn:     #ca8a04;
  --purple:   #7c3aed;
  --purpleDim:#ede9fe;
  --gold:     #ca8a04;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  color:var(--text);
  height:100%;
  overflow:hidden;
  transition: background .2s, color .2s;
}

.bb{font-family:Impact,'Arial Narrow',Arial,sans-serif;letter-spacing:.08em;}

/* ── TEAM MANAGEMENT ── */
.tm{height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.tm-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top, 0px) + 14px) calc(env(safe-area-inset-right, 0px) + 13px) 11px calc(env(safe-area-inset-left, 0px) + 13px);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tm-hdr-title{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);flex:1;}
.tm-back{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:2px 6px;}
.tm-add-btn{background:var(--accent);color:#111;border:none;border-radius:9px;padding:8px 14px;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;}
.tm-body{flex:1;overflow-y:auto;padding:10px 12px;}
.tm-empty{text-align:center;color:var(--dim);font-size:13px;padding:40px 20px;line-height:1.8;}
.team-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
.team-card:active{opacity:.8;}
.team-card-name{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);margin-bottom:3px;}
.team-card-meta{font-size:11px;color:var(--dim);margin-bottom:6px;}
.team-card-row{display:flex;align-items:center;justify-content:space-between;}
.team-card-players{font-size:11px;color:var(--green);}
.team-card-actions{display:flex;gap:6px;}
.tc-edit{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;}
.tc-del{background:rgba(255,85,85,.1);border:1.5px solid rgba(255,85,85,.3);color:var(--red);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;}

/* team edit form */
.te-body{flex:1;overflow-y:auto;padding:10px 12px 30px;}
.te-field{margin-bottom:12px;}
.te-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:5px;}
.te-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:14px;outline:none;}
.te-input:focus{border-color:var(--accent);}
.te-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.te-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.te-footer{background:var(--surface);border-top:1px solid var(--border);padding:10px calc(env(safe-area-inset-right, 0px) + 12px) calc(env(safe-area-inset-bottom, 0px) + 10px) calc(env(safe-area-inset-left, 0px) + 12px);display:flex;gap:8px;flex-shrink:0;}
.te-save{flex:1;background:var(--accent);color:#111;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:20px;letter-spacing:2px;border:none;border-radius:10px;padding:13px;cursor:pointer;}
.te-cancel{background:var(--card);border:1.5px solid var(--border);color:var(--dim);font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:16px;letter-spacing:1px;border-radius:10px;padding:13px 16px;cursor:pointer;}
.te-section-hdr{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:13px;letter-spacing:2px;color:var(--blue);border-bottom:1px solid var(--border);padding-bottom:5px;margin:16px 0 10px;display:flex;align-items:center;justify-content:space-between;}
.te-add-player{width:100%;background:var(--blueDim);border:1.5px dashed var(--border);border-radius:9px;padding:10px;color:var(--blue);font-size:12px;cursor:pointer;text-align:center;margin-top:6px;}
.player-row{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.player-row-info{flex:1;min-width:0;}
.player-row-name{font-size:13px;font-weight:700;color:var(--text);}
.player-row-sub{font-size:10px;color:var(--dim);margin-top:1px;}
.player-row-num{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:18px;color:var(--accent);letter-spacing:.05em;flex-shrink:0;}
.player-row-edit{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:4px;}
.player-row-del{background:none;border:none;color:rgba(255,85,85,.5);font-size:16px;cursor:pointer;padding:4px;}
.player-edit-panel{background:var(--surface);border:1.5px solid var(--blue);border-radius:10px;padding:10px 11px;margin-bottom:6px;}
.pep-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.pep-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px;outline:none;}
.pep-input:focus{border-color:var(--blue);}
.pep-row{display:flex;gap:7px;}
.pep-save{flex:1;background:#3ecf6e;color:#0a1a0a;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:15px;letter-spacing:1px;border:none;border-radius:8px;padding:9px;cursor:pointer;}
.pep-cancel{background:#2e3350;border:none;color:#7a80a0;font-size:13px;border-radius:8px;padding:9px 13px;cursor:pointer;}

/* team selector in setup */
.team-selector{background:#1a1e2a;border:1.5px solid #2e3350;border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.ts-info{flex:1;min-width:0;}
.ts-name{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:16px;letter-spacing:1px;color:#f08c00;}
.ts-meta{font-size:10px;color:#7a80a0;margin-top:1px;}
.ts-arrow{color:#7a80a0;font-size:16px;flex-shrink:0;}
.team-select-dropdown{background:#1a1e2a;border:1.5px solid #2e3350;border-radius:10px;overflow:hidden;margin-bottom:10px;}
.tsd-item{padding:11px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid #2e3350;}
.tsd-item:last-child{border-bottom:none;}
.tsd-item:active{background:#222736;}
.tsd-item.active{background:#1a2e1a;}
.tsd-name{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:14px;letter-spacing:1px;color:#f08c00;flex:1;}
.tsd-meta{font-size:10px;color:#7a80a0;}
.tsd-check{color:#3ecf6e;font-size:16px;flex-shrink:0;}
.opponent-input{width:100%;background:#222736;border:1.5px solid #2e3350;border-radius:9px;padding:10px 12px;color:#eef0f8;font-size:14px;outline:none;margin-top:0;}
.opponent-input:focus{border-color:#4a9eff;}

/* ── EXPORT MODAL ── */
.export-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;display:flex;align-items:flex-end;padding:0;backdrop-filter:blur(3px);}
.export-modal-box{background:var(--surface);border-top:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 16px 30px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px;}
.export-modal-title{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent);}
.export-modal-sub{font-size:12px;color:var(--dim);margin-top:-6px;}
.export-textarea{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:10px;color:var(--text);font-family:monospace;font-size:11px;resize:none;min-height:120px;outline:none;}
.export-btns{display:flex;gap:8px;}
.export-share-btn{flex:1;background:var(--accent);color:#111;font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:17px;letter-spacing:1px;border:none;border-radius:10px;padding:12px;cursor:pointer;}
.export-copy-btn{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:17px;letter-spacing:1px;border-radius:10px;padding:12px;cursor:pointer;}
.export-cancel-btn{background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;padding:4px;text-align:center;width:100%;}

/* ── CONFIRMATION MODAL ── */
.confirm-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.confirm-box{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px 20px;max-width:320px;width:100%;text-align:center;}
.confirm-title{font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:8px;}
.confirm-title.danger{color:var(--red);}
.confirm-title.warn{color:var(--amber);}
.confirm-body{font-size:13px;color:var(--dim);margin-bottom:20px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;}
.confirm-cancel{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:Impact,'Arial Narrow',Arial,sans-serif;font-size:18px;letter-spacing:1px;border-radius:10px;padding:12px;cursor:pointer;}

}

/* ── STEPPER ── */

/* ── FLASH ── */

/* ── TABLET / IPAD SCALING ── */

             padding-bottom: 10px; gap: 10px; }

<body>
<div id="app"></div>
<div id="flash-el"></div>
<div id="confirm-modal" style="display:none"></div>
<input type="file" id="import-file-input" accept=".json,.txt,application/json,text/plain" style="display:none" onchange="handleImportFile(this)">
<!-- Unlock audio on first touch anywhere — required for iOS Safari -->
<script>document.addEventListener('touchstart', function(){ unlockAudio(); }, {once:true, passive:true});</script>

<!-- Add to Home Screen banner (shown in browser, hidden in standalone) -->
<div id="install-banner">
  <p>🏀 <strong>Add Squad Manager to your Home Screen</strong> for the best experience</p>
  <p class="ib-sub">Tap <strong>Share ⬆</strong> then <strong>"Add to Home Screen"</strong> in Safari</p>
  <div class="ib-row">
    <button class="ib-ok" onclick="dismissBanner(true)">Got it</button>
    <button class="ib-dismiss" onclick="dismissBanner(false)">Not now</button>
  </div>
</div>
<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const COURT_SIZE = 5;
const TEAMS_KEY = 'squadmgr_teams_v1';
const SETTINGS_KEY = 'squadmgr_settings_v1';
const PLANS_KEY = 'squadmgr_plans_v1';
// ── Saved Sub Plans store ──
const P = {
  plans: [], // [{id, name, createdAt, players, h1Dur, h2Dur, h1Int, h2Int, h1Sps, h2Sps, subPlan:{h1,h2}}]
};

function savePlans(){
  try{
    // Serialise Sets to arrays
    const out=P.plans.map(p=>({
      ...p,
      subPlan:{
        h1:(p.subPlan.h1||[]).map(s=>s?{off:[...s.off],on:[...s.on]}:null),
        h2:(p.subPlan.h2||[]).map(s=>s?{off:[...s.off],on:[...s.on]}:null),
      }
    }));
    localStorage.setItem(PLANS_KEY, JSON.stringify(out));
  }catch(_){}
}

function loadPlans(){
  try{
    const raw=localStorage.getItem(PLANS_KEY);
    if(!raw) return;
    const arr=JSON.parse(raw)||[];
    P.plans=arr.map(p=>({
      ...p,
      subPlan:{
        h1:(p.subPlan.h1||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
        h2:(p.subPlan.h2||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
      }
    }));
  }catch(_){}
}

function saveCurrentPlan(name){
  if(!name||!name.trim()) return;
  const plan={
    id: uid(),
    name: name.trim(),
    createdAt: new Date().toLocaleString(),
    players: [...S.names.filter(n=>n.trim())],
    h1Dur:S.h1Dur, h2Dur:S.h2Dur,
    h1Int:S.h1Int, h2Int:S.h2Int,
    h1Sps:S.h1Sps, h2Sps:S.h2Sps,
    subPlan:{
      h1:(S.subPlan.h1||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
      h2:(S.subPlan.h2||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
    }
  };
  P.plans.unshift(plan); // newest first
  savePlans();
  return plan.id;
}

function loadPlan(id){
  const plan=P.plans.find(p=>p.id===id);
  if(!plan) return;
  S.subPlan={
    h1:(plan.subPlan.h1||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
    h2:(plan.subPlan.h2||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
  };
  S.h1Dur=plan.h1Dur; S.h2Dur=plan.h2Dur;
  S.h1Int=plan.h1Int; S.h2Int=plan.h2Int;
  S.h1Sps=plan.h1Sps; S.h2Sps=plan.h2Sps;
  S.useSubPlan=true;
  renderSetup(true);
  // Show brief confirmation
  showToast(`Plan "${plan.name}" loaded`);
}

function deletePlan(id){
  P.plans=P.plans.filter(p=>p.id!==id);
  savePlans();
  renderSetup(true);
}

function showSavePlanModal(onSave){
  const existing=$('save-plan-modal');
  if(existing) existing.remove();
  const modal=document.createElement('div');
  modal.id='save-plan-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);';
  modal.innerHTML=`
    <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:320px;">
      <div style="font-family:Impact,sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;">SAVE SUB PLAN</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:14px;">Give this plan a name to find it later</div>
      <input id="plan-name-input" style="width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;" placeholder="e.g. Eagles H1 rotation" autofocus>
      <div style="display:flex;gap:8px;">
        <button onclick="document.getElementById('save-plan-modal').remove()" style="flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--dim);font-family:Impact,sans-serif;font-size:17px;letter-spacing:1px;border-radius:10px;padding:11px;cursor:pointer;">CANCEL</button>
        <button onclick="handleSavePlan(${onSave?`'${onSave}'`:'null'})" style="flex:2;background:var(--accent);color:#111;font-family:Impact,sans-serif;font-size:17px;letter-spacing:1px;border:none;border-radius:10px;padding:11px;cursor:pointer;">SAVE PLAN</button>
      </div>
    </div>`;
  modal.onclick=e=>{ if(e.target===modal) modal.remove(); };
  document.body.appendChild(modal);
  setTimeout(()=>{ const inp=$('plan-name-input'); if(inp) inp.focus(); },100);
}

function handleSavePlan(after){
  const inp=$('plan-name-input');
  const name=inp?inp.value.trim():'';
  if(!name){ if(inp){inp.style.borderColor='var(--red)';} return; }
  const id=saveCurrentPlan(name);
  const modal=$('save-plan-modal');
  if(modal) modal.remove();
  showToast(`Plan "${name}" saved ✓`);
  if(after==='setup') renderSetup(true);
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--green);color:var(--green);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ── Settings / Theme ──
const DEFAULTS = {
  theme: 'dark',
  colors: {
    accent:  '#f08c00',
    green:   '#3ecf6e',
    blue:    '#4a9eff',
    red:     '#ff5555',
    warn:    '#ffcc00',
    purple:  '#c084fc',
  },
  apiKey: '',
};
const CFG = { theme: DEFAULTS.theme, colors: {...DEFAULTS.colors}, apiKey: '' };

function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify({theme:CFG.theme,colors:CFG.colors,apiKey:CFG.apiKey})); }catch(_){}
}
function loadSettings(){
  try{
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(raw){ const d=JSON.parse(raw); CFG.theme=d.theme||'dark'; CFG.colors={...DEFAULTS.colors,...(d.colors||{})}; CFG.apiKey=d.apiKey||''; }
  }catch(_){}
  applyTheme();
}
function applyTheme(){
  const root=document.documentElement;
  const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const isDark=CFG.theme==='dark'||(CFG.theme==='system'&&prefersDark);
  root.classList.toggle('theme-light',!isDark);
  // Apply custom colours
  Object.entries(CFG.colors).forEach(([k,v])=>root.style.setProperty('--'+k,v));
}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{ if(CFG.theme==='system') applyTheme(); });


// ── Teams store (persisted separately) ──
const T = {
  teams: [],          // [{id, club, league, season, ageBracket, year, players:[{id,firstName,lastName,nickname,singletNumber}]}]
  activeTeamId: null, // selected team for current game
  showDropdown: false,
  editingTeam: null,  // draft team being edited (null = not editing)
  editingPlayerId: null, // player id currently open in inline editor
  playerDraft: {},    // draft fields for player being edited
};

function teamDisplayName(team){
  const parts=[team.club];
  if(team.ageBracket) parts.push(team.ageBracket);
  if(team.season) parts.push(team.season);
  return parts.join(' · ');
}

const fmt = s => `${Math.floor(Math.abs(s)/60)}:${String(Math.abs(s)%60).padStart(2,'0')}`;
const $  = id => document.getElementById(id);

// ── Audio & Haptics ──
// Single shared AudioContext — must be created/resumed on a user gesture
let _audioCtx = null;

function getAudioCtx(){
  if(!_audioCtx){
    try { _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){ return null; }
  }
  // iOS suspends the context if it wasn't created during a user gesture — resume it
  if(_audioCtx.state === 'suspended'){
    _audioCtx.resume().catch(()=>{});
  }
  return _audioCtx;
}

// Unlock audio on first user touch — call this on any tap before the game starts
function unlockAudio(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  if(ctx.state === 'suspended') ctx.resume().catch(()=>{});
  // Play a silent buffer to fully unlock on iOS
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(_){}
}

function playDing(n=1){
  const ctx = getAudioCtx();
  if(!ctx) return;
  try {
    for(let i=0; i<n; i++){
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      const t = ctx.currentTime + i * 0.48;
      o.frequency.setValueAtTime(880, t);
      o.frequency.exponentialRampToValueAtTime(660, t + 0.18);
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(0.45, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.36);
      o.start(t); o.stop(t + 0.42);
    }
  } catch(_){}
}

// Haptics — navigator.vibrate works on Android; iOS ignores it silently
// For iOS we play a very short silent click sound as a substitute
function vibrate(pattern){
  try { navigator.vibrate && navigator.vibrate(pattern); } catch(_){}
  // iOS haptic substitute: silent audio click
  const ctx = getAudioCtx();
  if(!ctx) return;
  try {
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.001, ctx.currentTime); // near-silent
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.connect(g);
    o.frequency.value = 1;
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.001);
  } catch(_){}
}

let flashTimer=null;
function flashScreen(type){
  const el=$('flash-el');
  el.className=''; void el.offsetWidth; // reset animation
  el.className=type;
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{ el.className=''; },2300);
}

// ═══════════════════════════════════════════
// TICK
// ═══════════════════════════════════════════
let tickInterval=null;
let prevAlert=null;

function getHalfDur(){ return (S.phase==='h2'?S.h2Dur:S.h1Dur)*60; }
function getSubInt(){  return S.phase==='h2'?S.h2Int:S.h1Int; }  // already in seconds
function getCurrSps(){ return S.phase==='h2'?S.h2Sps:S.h1Sps; }

function setAlert(a){
  if(a===prevAlert) return;
  prevAlert=a;
  S.alertState=a;
  if(a==='warning'){ playDing(1); vibrate([150,80,150]); }
  if(a==='sub-now'){ playDing(2); vibrate([200,100,200,100,400]); flashScreen('sub'); }
  if(a==='halfend'){ playDing(3); vibrate([300,100,300,100,300,100,500]); flashScreen('half'); }
  updateAlertBar();
}

function startTick(){
  stopTick();
  tickInterval=setInterval(doTick,1000);
}
function stopTick(){
  if(tickInterval){ clearInterval(tickInterval); tickInterval=null; }
}

function doTick(){
  if(!S.isRunning) return;
  const isH2=S.phase==='h2';
  S.gameTime++;
  S.halfTime++;

  S.players.forEach(p=>{
    if(p.onCourt){
      p.playTime++; p.benchStint=0;
      if(!isH2) p.h1PlayTime++; else p.h2PlayTime++;
    } else {
      p.benchTime++; p.benchStint++;
    }
  });

  // Sub countdown
  S.subCountdown--;
  if(S.subCountdown<=0){
    S.subCountdown=getSubInt();
    if(S.alertState!=='halfend') setAlert('sub-now');
    else updateAlertBar();
  } else if(S.subCountdown<=30){
    if(S.alertState!=='halfend'&&S.alertState!=='sub-now') setAlert('warning');
  } else {
    if(S.alertState!=='halfend'&&S.alertState!=='sub-now') setAlert(null);
  }

  // Half end
  if(S.halfTime===getHalfDur()) setAlert('halfend');

  updateTimerDOM();
}

function calcForecast(){
  const active=S.players.filter(p=>p.fouls<5);
  const aCount=active.length||1;
  const totalSecs=(S.h1Dur+S.h2Dur)*60;
  const targetTime=Math.round(totalSecs*COURT_SIZE/aCount);
  const halfRem=getHalfDur()-S.halfTime;
  const h2Rem=S.phase==='h2'?halfRem : S.phase==='h1'?S.h2Dur*60:0;
  const gameRem=(S.phase==='h1'?halfRem:0)+h2Rem;
  const remPP=Math.round(gameRem*COURT_SIZE/aCount);
  return {targetTime, remPP};
}

function fcColor(fc,target){
  if(fc>=target) return '#3ecf6e';
  if(fc>=target*0.85) return '#ffcc00';
  return '#ff5555';
}

function updateTimerDOM(){
  const halfRem=getHalfDur()-S.halfTime;
  const subC=S.alertState==='sub-now'?'#ff5555':S.alertState==='warning'?'#ffcc00':'#eef0f8';
  const halfC=halfRem<=60?'#ff5555':halfRem<=120?'#ffcc00':'#eef0f8';

  setText('gclock', fmt(S.gameTime));
  const hremEl=$('hrem');
  if(hremEl){ hremEl.textContent=halfRem>=0?fmt(halfRem):'+'+fmt(-halfRem); hremEl.style.color=halfC; }
  const scEl=$('scdown');
  if(scEl){ scEl.textContent=fmt(S.subCountdown); scEl.style.color=subC; }

  const {targetTime,remPP}=calcForecast();
  S.players.forEach(p=>{
    setText('pt-'+p.id, fmt(p.playTime));
    setText('bt-'+p.id, fmt(p.benchTime));
    setText('bs-'+p.id, fmt(p.benchStint));
    const fcEl=$('fc-'+p.id);
    if(fcEl&&p.fouls<5){
      const fc=p.playTime+remPP;
      fcEl.textContent=fmt(fc);
      fcEl.style.color=fcColor(fc,targetTime);
    }
  });
}

function updateAlertBar(){
  const el=$('alert-bar');
  if(!el) return;
  if(S.alertState==='warning'){  el.className='abar warn'; el.textContent='⏱ SUB IN 30 SECONDS'; el.style.display='block'; }
  else if(S.alertState==='sub-now'){ el.className='abar now'; el.textContent='🔔 TIME TO SUBSTITUTE!'; el.style.display='block'; }
  else if(S.alertState==='halfend'){ el.className='abar half'; el.textContent=`🏀 ${S.phase==='h2'?'FULL TIME — TAP END GAME':'HALF TIME — TAP END HALF'}`; el.style.display='block'; }
  else { el.style.display='none'; }
}

function courtPlayers(){ return S.players.filter(p=>p.onCourt).sort((a,b)=>a.playTime-b.playTime); }
function benchPlayers(){ return S.players.filter(p=>!p.onCourt).sort((a,b)=>b.benchStint-a.benchStint); }
function highlightCourt(){

}
function highlightBench(){

// ── Sub Plan Helpers ──
function getCourtAtPlanPoint(halfKey, subIdx){
  const filtered=S.names.filter(n=>n.trim());
  let courtIds;
  if(halfKey==='h2'&&S.useH2Preset&&S.h2PresetIds.size===COURT_SIZE){
    courtIds=new Set(S.h2PresetIds);
  } else {
    courtIds=new Set(filtered.slice(0,COURT_SIZE).map((_,i)=>i));
  }
  const plan=S.subPlan[halfKey]||[];
  for(let i=0;i<subIdx;i++){
    const sub=plan[i];
    if(sub){ sub.off.forEach(id=>courtIds.delete(id)); sub.on.forEach(id=>courtIds.add(id)); }
  }
  return courtIds;
}

function getPlanHighlights(){
  // Final-5 always shows regardless of showPlanned toggle
  if(S.useFinalPreset && S.finalPresetIds.size===COURT_SIZE && S.phase==='h2'){
    const halfSecs=S.h2Dur*60;
    const numSubs=Math.max(0,Math.ceil(halfSecs/S.h2Int)-1);
    if(S.planSubIdx>=numSubs-1){
      const finalIds=S.finalPresetIds;
      const courtIds=new Set(courtPlayers().map(p=>p.id));
      const off=new Set([...courtIds].filter(id=>!finalIds.has(id)));
      const on=new Set([...finalIds].filter(id=>!courtIds.has(id)));
      if(off.size>0||on.size>0) return {off, on, isFinal:true};
    }
  }
  if(!S.useSubPlan || !S.showPlanned) return null;
  const halfKey=S.phase==='h2'?'h2':'h1';
  const plan=S.subPlan[halfKey]||[];
  const sub=plan[S.planSubIdx];
  if(!sub||(!sub.off.size&&!sub.on.size)) return null;
  return {off:sub.off, on:sub.on, isFinal:false};
}

function planToggle(halfKey, subIdx, pid, role){
  if(!S.subPlan[halfKey]) S.subPlan[halfKey]=[];
  if(!S.subPlan[halfKey][subIdx]) S.subPlan[halfKey][subIdx]={off:new Set(),on:new Set()};
  const sub=S.subPlan[halfKey][subIdx];
  if(role==='court'){ sub.off.has(pid)?sub.off.delete(pid):sub.off.add(pid); }
  else              { sub.on.has(pid) ?sub.on.delete(pid) :sub.on.add(pid);  }
  renderSetup(true);
}

function planClear(halfKey, subIdx){
  if(S.subPlan[halfKey]&&S.subPlan[halfKey][subIdx])
    S.subPlan[halfKey][subIdx]={off:new Set(),on:new Set()};
  renderSetup(true);
}

function calcPlanPlayTimes(){
  // Returns {name, secs}[] estimating each player's total court time across both halves
  const filtered=S.names.filter(n=>n.trim());
  if(filtered.length<COURT_SIZE) return [];
  const totalSecs=(S.h1Dur+S.h2Dur)*60;

  // Simulate who is on court second-by-second using the plan
  const playSecs=filtered.map(()=>0);

  const simHalf=(halfKey,dur,intv)=>{
    // Starting court for this half
    let courtIds;
    if(halfKey==='h2'&&S.useH2Preset&&S.h2PresetIds.size===COURT_SIZE)
      courtIds=new Set(S.h2PresetIds);
    else
      courtIds=new Set(filtered.slice(0,COURT_SIZE).map((_,i)=>i));

    const plan=S.subPlan[halfKey]||[];
    const halfSecs=dur*60;
    // Real subs: exclude the one at exact end of half
    const numSubs=Math.max(0, Math.ceil(halfSecs/intv)-1);
    let prevTime=0;

    for(let i=0;i<=numSubs;i++){
      const subTime=i<numSubs?(i+1)*intv:halfSecs;
      const stint=subTime-prevTime;
      courtIds.forEach(id=>{ if(id<playSecs.length) playSecs[id]+=stint; });
      if(i<numSubs){
        const sub=plan[i];
        if(sub){ sub.off.forEach(id=>courtIds.delete(id)); sub.on.forEach(id=>courtIds.add(id)); }
      }
      prevTime=subTime;
    }
  };

  simHalf('h1',S.h1Dur,S.h1Int);
  simHalf('h2',S.h2Dur,S.h2Int);
  return filtered.map((name,i)=>({name, secs:playSecs[i]||0}));
}

// ── Position display helpers ──
const POS_SHORT = ['1','2','3','4','5'];
const POS_FULL  = ['Point Guard','Shooting Guard','Small Forward','Power Forward','Centre'];
const ALT_OPTS  = ['None','1','2','3','4','5'];

// Get primary position label for a player by display name
function posLabelForName(name){
  const team = T.teams.find(t=>t.id===T.activeTeamId);
  if(!team) return null;
  const player = team.players.find(p=>playerDisplayName(p)===name);
  if(!player) return null;
  const r = getPlayerRatings(T.activeTeamId, player.id);
  if(r.position === undefined) return null;
  return POS_SHORT[parseInt(r.position)] || null;
}

// Get all positions (primary + alts) for a player name
function allPositionsForName(name){
  const team = T.teams.find(t=>t.id===T.activeTeamId);
  if(!team) return [];
  const player = team.players.find(p=>playerDisplayName(p)===name);
  if(!player) return [];
  const r = getPlayerRatings(T.activeTeamId, player.id);
  const positions = [];
  if(r.position !== undefined) positions.push(POS_SHORT[parseInt(r.position)]);
  if(r.position2 && parseInt(r.position2)>0) positions.push(POS_SHORT[parseInt(r.position2)-1]);
  if(r.position3 && parseInt(r.position3)>0) positions.push(POS_SHORT[parseInt(r.position3)-1]);
  return positions.filter(Boolean);
}

// Get positions for a game player (by player id = index into S.names)
function posLabelForPlayer(pid){
  const name = S.names[pid];
  return name ? posLabelForName(name) : null;
}

function allPositionsForPlayer(pid){
  const name = S.names[pid];
  return name ? allPositionsForName(name) : [];
}

// ── Position coverage helpers ──

// Get set of positions covered by a list of player names
function coveredPositions(names){
  const covered = new Set();
  (names||[]).forEach(nm=>{ allPositionsForName(nm).forEach(pos=>covered.add(pos)); });
  return covered;
}

// Get positions a player can fill that are missing from the lineup
function fillablePositions(playerName, coveredSet){
  return allPositionsForName(playerName).filter(pos=>!coveredSet.has(pos));
}

// Render colour-coded position badges for a chip
function posFillBadgeHTML(playerName, coveredSet, isSelected){
  const allPos = allPositionsForName(playerName);
  if(!allPos.length) return '';
  if(isSelected){
    return allPos.map(p=>'<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(74,158,255,.18);color:#7ab8ff;letter-spacing:.5px">'+p+'</span>').join('');
  }
  const fills = allPos.filter(p=>!coveredSet.has(p));
  return allPos.map(p=>{
    const needed = !coveredSet.has(p);
    return '<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:'+(needed?'rgba(240,140,0,.22)':'rgba(120,128,160,.12)')+';color:'+(needed?'var(--accent)':'var(--dim)')+';letter-spacing:.5px">'+p+'</span>';
  }).join('');
}

// Missing positions summary line
function missingPositionsHTML(selectedNames){
  if(!selectedNames||!selectedNames.length) return '';
  const anyRatings = selectedNames.some(nm=>allPositionsForName(nm).length>0);
  if(!anyRatings) return '';
  const covered = coveredPositions(selectedNames);
  const missing = ['1','2','3','4','5'].filter(p=>!covered.has(p));
  if(!missing.length) return '<span style="color:var(--green);font-size:10px;font-weight:700">✓ All positions covered</span>';
  return '<span style="color:var(--warn);font-size:10px;">Missing: <strong style="color:var(--accent)">'+missing.join(', ')+'</strong></span>';
}

// Simple position badge for a chip (primary position only)
function posChipBadge(name){
  const pos = posLabelForName(name);
  return pos ? ' <span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(74,158,255,.18);color:#7ab8ff;letter-spacing:.5px">'+pos+'</span>' : '';
}

// Small position badge HTML (used in game cards)
function posBadgeHTML(label, style){
  if(!label) return '';
  return '<span style="font-size:8px;font-weight:700;letter-spacing:.5px;padding:1px 5px;border-radius:4px;background:rgba(74,158,255,.18);color:#7ab8ff;'+(style||'')+'">'+label+'</span>';
}

function buildSubPlanHTML(){
  if(!S.useSubPlan) return '';
  const filtered=S.names.filter(n=>n.trim());
  if(filtered.length<COURT_SIZE)
    return '<div style="color:var(--dim);font-size:11px;padding:4px">Add at least 5 players to build a plan</div>';

  // Playing time summary
  const planTimes=calcPlanPlayTimes();
  const summaryHTML=planTimes.length?`
    <div style="background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:10px;">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:7px;">Expected Playing Time (planned subs)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${planTimes.map(({name,secs})=>{
          const totalSecs=(S.h1Dur+S.h2Dur)*60;
          const pct=Math.round(secs/totalSecs*100);
          const col=secs>=totalSecs*COURT_SIZE/planTimes.length*0.85?'var(--green)':secs>=totalSecs*COURT_SIZE/planTimes.length*0.6?'var(--warn)':'var(--red)';
          return `<div style="background:var(--surface);border-radius:6px;padding:4px 8px;font-size:10px;border:1px solid var(--border)">
            <span style="font-weight:700;color:var(--text)">${name.split(' ')[0]}</span>
            <span style="color:${col};margin-left:4px;font-family:Impact,sans-serif;font-size:12px">${fmt(secs)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`:'';

  const renderHalf=(halfKey,dur,intv,label)=>{
    const halfSecs=dur*60;
    // Exclude sub at exact end of half
    const numSubs=Math.max(0, Math.ceil(halfSecs/intv)-1);
    if(!numSubs) return '';
    let h=`<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:6px;margin-top:4px">${label} — ${numSubs} sub${numSubs!==1?'s':''}</div>`;
    for(let i=0;i<numSubs;i++){
      const atTime=(i+1)*intv;
      const courtIds=getCourtAtPlanPoint(halfKey,i);
      const benchIds=new Set(filtered.map((_,idx)=>idx).filter(id=>!courtIds.has(id)));
      const sub=(S.subPlan[halfKey]&&S.subPlan[halfKey][i])||{off:new Set(),on:new Set()};
      const isValid=sub.off.size>0&&sub.off.size===sub.on.size;
      const hasAny=sub.off.size>0||sub.on.size>0;
      const mismatch=hasAny&&sub.off.size!==sub.on.size;

      const courtChips=[...courtIds].map(id=>{
        const nm=filtered[id]; const isOff=sub.off.has(id);
        const pos=posLabelForName(nm);
        const posBadge=pos?` <span style="font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(74,158,255,.18);color:#7ab8ff">${pos}</span>`:'';
        return `<div class="plan-chip ${isOff?'off':'court-idle'}" onclick="planToggle('${halfKey}',${i},${id},'court')">${isOff?'▼ ':''}${nm}${posBadge}</div>`;
      }).join('');
      const benchChips=[...benchIds].map(id=>{
        const nm=filtered[id]; const isOn=sub.on.has(id);
        const pos=posLabelForName(nm);
        const posBadge=pos?` <span style="font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(74,158,255,.18);color:#7ab8ff">${pos}</span>`:'';
        return `<div class="plan-chip ${isOn?'on':'bench-idle'}" onclick="planToggle('${halfKey}',${i},${id},'bench')">${isOn?'▲ ':''}${nm}${posBadge}</div>`;
      }).join('');

      const statusHTML=isValid
        ?`<span style="font-size:9px;color:var(--green)">✓ ${sub.off.size} off, ${sub.on.size} on</span>`
        :mismatch?`<span style="font-size:9px;color:var(--warn)">Select equal off/on</span>`:'';

      h+=`<div class="plan-slot${isValid?' done':''}">
        <div class="plan-slot-hdr">
          <span class="plan-slot-title">SUB ${i+1} @ ${fmt(atTime)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            ${statusHTML}
            ${hasAny?`<button style="background:none;border:none;color:var(--dim);font-size:10px;cursor:pointer" onclick="planClear('${halfKey}',${i})">✕ clear</button>`:''}
          </div>
        </div>
        <div class="plan-row-lbl">Court — tap to sub off ▼</div>
        <div class="plan-chips">${courtChips||'<span style="color:var(--dim);font-size:10px">Empty court</span>'}</div>
        <div class="plan-row-lbl">Bench — tap to sub on ▲</div>
        <div class="plan-chips">${benchChips||'<span style="color:var(--dim);font-size:10px">Empty bench</span>'}</div>
      </div>`;
    }
    return h;
  };

  return summaryHTML
       + renderHalf('h1',S.h1Dur,S.h1Int,'1ST HALF')
       + renderHalf('h2',S.h2Dur,S.h2Int,'2ND HALF');
}

function startGame(){
  unlockAudio();
  const filtered=S.names.filter(n=>n.trim());
  S.players=filtered.map((name,i)=>({
    id:i, name, onCourt:i<COURT_SIZE,
    playTime:0, h1PlayTime:0, h2PlayTime:0,
    benchTime:0, benchStint:0, fouls:0
  }));
  S.gameTime=0; S.halfTime=0;
  S.subCountdown=S.h1Int;  // already in seconds
  S.alertState=null; prevAlert=null;
  S.isRunning=false; S.planSubIdx=0;
  S.subLog=[]; S.savedGame=null;
  S.selCourt=new Set(); S.selBench=new Set();
  S.phase='h1';
  render();
}

function goToSetup(){
  stopTick(); S.isRunning=false;
  S.savedGame={
    phase:S.phase, players:S.players.map(p=>({...p})),
    gameTime:S.gameTime, halfTime:S.halfTime, subCountdown:S.subCountdown,
    alertState:S.alertState, h1Dur:S.h1Dur, h2Dur:S.h2Dur,
    h1Int:S.h1Int, h2Int:S.h2Int, h1Sps:S.h1Sps, h2Sps:S.h2Sps, subLog:[...S.subLog]
  };
  S.phase='setup'; render();
}

function continueGame(){
  if(!S.savedGame) return;
  const sg=S.savedGame;
  S.players=sg.players.map(p=>({...p}));
  S.gameTime=sg.gameTime; S.halfTime=sg.halfTime;
  S.subCountdown=sg.subCountdown; S.alertState=sg.alertState; prevAlert=sg.alertState;
  S.h1Dur=sg.h1Dur; S.h2Dur=sg.h2Dur;
  S.h1Int=sg.h1Int; S.h2Int=sg.h2Int;
  S.h1Sps=sg.h1Sps; S.h2Sps=sg.h2Sps;
  S.subLog=[...sg.subLog]; S.isRunning=false;
  S.selCourt=new Set(); S.selBench=new Set();
  S.phase=sg.phase; render();
}

function togglePause(){
  unlockAudio();
  S.isRunning=!S.isRunning;
  if(S.isRunning) startTick(); else stopTick();
  const ovl=$('pause-ovl');
  if(ovl) ovl.style.display=S.isRunning?'none':'flex';
  const pbtn=$('pbtn');
  if(pbtn){ pbtn.textContent=S.isRunning?'⏸ TIMEOUT':'▶ RESUME'; pbtn.className='pbtn'+(S.isRunning?' live':''); }
}

function resumeFromOverlay(){
  if(!S.isRunning){ S.isRunning=true; startTick(); }
  const ovl=$('pause-ovl');
  if(ovl) ovl.style.display='none';
  const pbtn=$('pbtn');
  if(pbtn){ pbtn.textContent='⏸ TIMEOUT'; pbtn.className='pbtn live'; }
}

function commitSub(){
  const cp=courtPlayers();
  const availableSpots=COURT_SIZE-cp.length;
  const fillingUp=S.selCourt.size===0&&availableSpots>0&&S.selBench.size<=availableSpots;
  if(!S.selBench.size) return;
  if(!fillingUp&&!S.selCourt.size) return;

  const off=S.players.filter(p=>S.selCourt.has(p.id)).map(p=>p.name);
  const on =S.players.filter(p=>S.selBench.has(p.id)).map(p=>p.name);
  S.subLog.push({gameTime:S.gameTime, halfTime:S.halfTime, half:S.phase==='h2'?2:1, on, off});

  S.players.forEach(p=>{
    if(S.selCourt.has(p.id)){ p.onCourt=false; }
    if(S.selBench.has(p.id)){ p.onCourt=true; p.benchStint=0; }
  });

  S.selCourt=new Set(); S.selBench=new Set();
  S.subCountdown=getSubInt(); S.alertState=null; prevAlert=null;
  S.planSubIdx++;

  // ── Auto-rebalance: if sub plan exists, patch next 2 subs based on actual court ──
  if(S.useSubPlan){
    const halfKey=S.phase==='h2'?'h2':'h1';
    const dur=S.phase==='h2'?S.h2Dur:S.h1Dur;
    const halfSecs=dur*60;
    const numSubs=Math.max(0,Math.ceil(halfSecs/getSubInt())-1);
    const actualCourtIds=new Set(courtPlayers().map(p=>p.id));

    // For next 1-2 planned subs, rewrite them based on actual vs ideal
    for(let ahead=0; ahead<2; ahead++){
      const idx=S.planSubIdx+ahead;
      if(idx>=numSubs) break;
      const planned=S.subPlan[halfKey]&&S.subPlan[halfKey][idx];
      if(!planned||(!planned.off.size&&!planned.on.size)) break;

      // Check if planned sub still makes sense — if the players it moves are already on/off court
      const plannedOffStillOnCourt=[...planned.off].every(id=>actualCourtIds.has(id));
      const plannedOnStillOnBench=[...planned.on].every(id=>!actualCourtIds.has(id));
      if(plannedOffStillOnCourt && plannedOnStillOnBench) break; // plan is still valid

      // Rebalance: find players with most court time to come off, least to come on
      const courtArr=courtPlayers().sort((a,b)=>b.playTime-a.playTime);
      const benchArr=benchPlayers().filter(p=>p.fouls<5).sort((a,b)=>a.playTime-b.playTime);
      const sps=getCurrSps();
      const newOff=new Set(courtArr.slice(0,Math.min(sps,courtArr.length)).map(p=>p.id));
      const newOn=new Set(benchArr.slice(0,Math.min(sps,benchArr.length)).map(p=>p.id));

      if(!S.subPlan[halfKey]) S.subPlan[halfKey]=[];
      S.subPlan[halfKey][idx]={off:newOff, on:newOn, _autoRebalanced:true};
    }
  }

  vibrate([80,40,80]);
  renderGame();
}

function clearSel(){ S.selCourt=new Set(); S.selBench=new Set(); renderGame(); }

function togglePlayerSel(pid, role){
  const p=S.players.find(pl=>pl.id===pid);
  if(!p||p.fouls>=5) return;
  if(role==='court'){
    const s=new Set(S.selCourt);
    s.has(pid)?s.delete(pid):s.add(pid);
    S.selCourt=s;
  } else {
    const s=new Set(S.selBench);
    s.has(pid)?s.delete(pid):s.add(pid);
    S.selBench=s;
  }
  renderGame();
}

function toggleFoul(pid, dot){
  const p=S.players.find(pl=>pl.id===pid);
  if(!p) return;
  const newFouls=p.fouls>dot?dot:dot+1;
  const wasOut=p.fouls>=5;
  p.fouls=newFouls;
  if(newFouls>=5&&p.onCourt){ p.onCourt=false; }
  S.selCourt.delete(pid); S.selBench.delete(pid);
  renderGame();
}

function endHalf(){
  stopTick(); S.isRunning=false;
  const h2Court=S.useH2Preset&&S.h2PresetIds.size===COURT_SIZE
    ? new Set(S.h2PresetIds)
    : new Set(S.players.filter(p=>p.onCourt).map(p=>p.id));
  S.htOnCourt=h2Court;
  S.phase='halftime'; render();
}

function toggleHtPlayer(pid){
  const s=new Set(S.htOnCourt);
  if(s.has(pid)){ s.delete(pid); S.htOnCourt=s; }
  else if(s.size<COURT_SIZE){ s.add(pid); S.htOnCourt=s; }
  renderHalftime();
}

function startSecondHalf(){
  S.players.forEach(p=>{ p.onCourt=S.htOnCourt.has(p.id); p.benchStint=0; });
  S.halfTime=0; S.subCountdown=S.h2Int;  // already in seconds
  S.alertState=null; prevAlert=null; S.planSubIdx=0;
  S.selCourt=new Set(); S.selBench=new Set();
  S.phase='h2'; S.isRunning=false;
  render();
}

function endGame(){ stopTick(); S.isRunning=false; S.phase='gameover'; render(); }

function exportReport(){
  const now=new Date();
  const pad=(s,w)=>String(s).padEnd(w);
  const line='─'.repeat(68);
  const sorted=[...S.players].sort((a,b)=>b.playTime-a.playTime);
  let txt=`SQUAD MANAGER — GAME REPORT\nGenerated: ${now.toLocaleString()}\n${line}\n\n`;
  txt+=`GAME SETTINGS\n`;
  txt+=`• 1st Half: ${S.h1Dur} min | Sub every: ${S.h1Int} min | Per sub: ${S.h1Sps}\n`;
  txt+=`• 2nd Half: ${S.h2Dur} min | Sub every: ${S.h2Int} min | Per sub: ${S.h2Sps}\n\n`;
  txt+=`PLAYER STATISTICS (sorted by total playing time)\n${line}\n`;
  txt+=`${pad('Player',15)}${pad('1st Half',10)}${pad('2nd Half',10)}${pad('Total',10)}Fouls\n${line}\n`;
  sorted.forEach(p=>{
    txt+=`${pad(p.name,15)}${pad(fmt(p.h1PlayTime),10)}${pad(fmt(p.h2PlayTime),10)}${pad(fmt(p.playTime),10)}${p.fouls}\n`;
  });
  if(S.subLog.length){
    txt+=`\nSUBSTITUTION LOG (${S.subLog.length} subs)\n${line}\n`;
    txt+=`${pad('Game',10)}${pad('Half',6)}${pad('HalfT',10)}${pad('On',22)}Off\n${line}\n`;
    S.subLog.forEach(e=>{
      txt+=`${pad(fmt(e.gameTime),10)}${pad('H'+e.half,6)}${pad(fmt(e.halfTime),10)}${pad(e.on.join(', '),22)}${e.off.join(', ')}\n`;
    });
  }
  const filename=`squad_report_${now.toISOString().slice(0,10)}.txt`;
  const blob=new Blob([txt],{type:'text/plain'});
  if(navigator.canShare){
    const file=new File([blob],filename,{type:'text/plain'});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Squad Manager Game Report'}).catch(()=>{});
      return;
    }
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function foulDotsHTML(pid, fouls){
  let h=`<div class="fr" onclick="event.stopPropagation()"><span class="fl">Fouls</span>`;
  for(let i=0;i<5;i++){
    h+=`<button class="fd${fouls>i?' on':''}" onclick="event.stopPropagation();toggleFoul(${pid},${i})"></button>`;
  }
  if(fouls>=5) h+=`<span class="fotag">OUT</span>`;
  h+=`</div>`;
  return h;
}

function playerCardHTML(p, role, isHigh, isSel, {targetTime,remPP}, planHighlights){
  const fouledOut=p.fouls>=5;
  const isPlannedOff=planHighlights&&planHighlights.off.has(p.id);
  const isPlannedOn =planHighlights&&planHighlights.on.has(p.id);
  const isFinal     =planHighlights&&planHighlights.isFinal;

  // Card colour priority: planned > highlight suggestion > normal
  let sk;
  if(isPlannedOff)        sk=isFinal?'pf':'pp';
  else if(isPlannedOn)    sk=isFinal?'pf':'pq';
  else if(role==='court') sk=isHigh?'cx':'cn';
  else                    sk=isHigh?'bx':'bn';

  const selClass=isSel?' sel':'';
  const foClass=fouledOut?' fo':'';
  const selectable=fouledOut?'':' selectable';
  const click=fouledOut
    ?`onclick="event.stopPropagation()"`
    :`onclick="event.stopPropagation();togglePlayerSel(${p.id},'${role}')"`;

  // Position display
  const primaryPos = posLabelForPlayer(p.id);
  const allPos     = allPositionsForPlayer(p.id);
  // Court: show primary position. Bench planned-on: show all positions they cover.
  const posDisplay = role==='court' && primaryPos
    ? `<span style="font-size:8px;font-weight:700;font-family:Impact,'Arial Narrow',Arial,sans-serif;letter-spacing:.5px;padding:1px 5px;border-radius:4px;background:rgba(74,158,255,.15);color:#7ab8ff;margin-left:3px;">${primaryPos}</span>`
    : role==='bench' && isPlannedOn && allPos.length
    ? `<span style="font-size:8px;font-weight:700;font-family:Impact,'Arial Narrow',Arial,sans-serif;letter-spacing:.5px;padding:1px 5px;border-radius:4px;background:rgba(167,139,250,.2);color:#a78bfa;margin-left:3px;">${allPos.join('/')}</span>`
    : role==='bench' && isHigh && primaryPos
    ? `<span style="font-size:8px;font-weight:700;font-family:Impact,'Arial Narrow',Arial,sans-serif;letter-spacing:.5px;padding:1px 5px;border-radius:4px;background:rgba(74,158,255,.15);color:#7ab8ff;margin-left:3px;">${primaryPos}</span>`
    : '';

  let badge='';
  if(fouledOut)         badge=`<span class="cbadge bred">FOULED OUT</span>`;
  else if(isSel)        badge=`<span class="cbadge bsel">✓</span>`;
  else if(isPlannedOff) badge=`<span class="cbadge ${isFinal?'bpf':'bpo'}">${isFinal?'★ FINAL OFF':'PLANNED OFF'}</span>`;
  else if(isPlannedOn)  badge=`<span class="cbadge ${isFinal?'bpf':'bpi'}">${isFinal?'★ FINAL ON':'PLANNED ON'}</span>`;
  else if(isHigh&&role==='court') badge=`<span class="cbadge bo">OUT</span>`;
  else if(isHigh&&role==='bench') badge=`<span class="cbadge bi">IN</span>`;

  const fc=p.fouls<5?p.playTime+remPP:null;
  const fcHTML=fc!==null
    ?`<div class="stat"><span id="fc-${p.id}" class="sv" style="color:${fcColor(fc,targetTime)}">${fmt(fc)}</span><span class="sk">Forecast</span></div>`
    :'';

  const benchHTML=role==='bench'
    ?`<div class="stat"><span id="bt-${p.id}" class="sv svb">${fmt(p.benchTime)}</span><span class="sk">Total bench</span></div>
      <div class="stat"><span id="bs-${p.id}" class="sv svt">${fmt(p.benchStint)}</span><span class="sk">This stint</span></div>`
    :`<div class="stat"><span id="bt-${p.id}" class="sv svb">${fmt(p.benchTime)}</span><span class="sk">Bench</span></div>`;

  return `
<div class="pc ${sk}${selClass}${foClass}${selectable}${role==='court'?' court-card':''}" ${click}>
  <div class="ctop"><div class="cname">${p.name}${posDisplay}</div>${badge}</div>
  <div class="cstats">
    <div class="stat"><span id="pt-${p.id}" class="sv svg">${fmt(p.playTime)}</span><span class="sk">Played</span></div>
    ${fcHTML}${benchHTML}
  </div>
  ${foulDotsHTML(p.id, p.fouls)}
</div>`;
}

function pauseOverlayHTML(){
  const cp=courtPlayers();
  const bp=benchPlayers();
  const sps=getCurrSps();
  const gameStarted=S.gameTime>0;

  // Determine who is highlighted for next sub
  const planHL=getPlanHighlights();
  let nextOffIds, nextOnIds, isPlanned=false, isFinalHL=false;
  if(planHL){
    nextOffIds=planHL.off; nextOnIds=planHL.on;
    isPlanned=true; isFinalHL=planHL.isFinal;
  } else {
    nextOffIds=new Set(cp.slice(-sps).map(p=>p.id));
    nextOnIds=new Set(bp.filter(p=>p.fouls<5).slice(0,sps).map(p=>p.id));
  }

  const stayOn=cp.filter(p=>!nextOffIds.has(p.id));
  const nextOff=cp.filter(p=>nextOffIds.has(p.id));
  const nextOn=bp.filter(p=>nextOnIds.has(p.id));
  const otherBench=bp.filter(p=>!nextOnIds.has(p.id));

  const offColor=isFinalHL?'var(--gold)':'rgba(255,140,0,.85)';
  const onColor=isFinalHL?'var(--gold)':'rgba(0,207,180,.85)';
  const offBg=isFinalHL?'rgba(46,32,0,.7)':'rgba(46,26,0,.65)';
  const onBg=isFinalHL?'rgba(46,32,0,.7)':'rgba(0,61,55,.65)';
  const offBorder=isFinalHL?'rgba(250,204,21,.4)':'rgba(255,140,0,.4)';
  const onBorder=isFinalHL?'rgba(250,204,21,.4)':'rgba(0,207,180,.4)';

  const pillLarge=(name, time, timeColor, bg, border)=>
    `<div style="border-radius:9px;padding:7px 11px;border:1.5px solid ${border};background:${bg};display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;">
      <span style="font-weight:700;font-size:15px;color:#eef0f8;">${name}</span>
      <span style="font-family:Impact,sans-serif;font-size:14px;color:${timeColor}">${time}</span>
    </div>`;

  const pillSmall=(name, time, timeColor)=>
    `<div style="border-radius:7px;padding:5px 9px;border:1px solid var(--border);background:rgba(30,34,50,.65);display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px;">
      <span style="font-weight:600;font-size:12px;color:#eef0f8;">${name}</span>
      <span style="font-family:Impact,sans-serif;font-size:11px;color:${timeColor}">${time}</span>
    </div>`;

  let leftHTML='', rightHTML='';

  if(gameStarted){
    // Left: staying on + sub off
    if(stayOn.length){
      leftHTML+=`<div class="po-chdr court">STAYING ON</div>`;
      stayOn.forEach(p=>{ leftHTML+=pillSmall(p.name, fmt(p.playTime), 'var(--green)'); });
    }
    if(nextOff.length){
      const lbl=isFinalHL?'★ FINAL OFF':isPlanned?'PLANNED OFF':'SUB OFF';
      leftHTML+=`<div class="po-chdr sub-out" style="margin-top:${stayOn.length?7:0}px;background:${offBg};border:1px solid ${offBorder};color:${offColor};">${lbl}</div>`;
      nextOff.forEach(p=>{ leftHTML+=pillLarge(p.name, fmt(p.playTime), offColor, offBg, offBorder); });
    }
    if(!cp.length) leftHTML+=`<div style="text-align:center;color:var(--dim);font-size:11px;padding:10px">Empty court</div>`;

    // Right: sub on + rest of bench
    if(nextOn.length){
      const lbl=isFinalHL?'★ FINAL ON':isPlanned?'PLANNED ON':'SUB ON';
      rightHTML+=`<div class="po-chdr" style="background:${onBg};border:1px solid ${onBorder};color:${onColor};border-radius:5px;font-family:Impact,sans-serif;font-size:10px;letter-spacing:2px;text-align:center;padding:3px;margin-bottom:2px;">${lbl}</div>`;
      nextOn.forEach(p=>{ rightHTML+=pillLarge(p.name, fmt(p.benchTime), onColor, onBg, onBorder); });
    }
    if(otherBench.length){
      rightHTML+=`<div class="po-chdr bench" style="margin-top:${nextOn.length?7:0}px">BENCH</div>`;
      otherBench.forEach(p=>{ rightHTML+=pillSmall(p.name, fmt(p.benchTime), 'var(--blue)'); });
    }
    if(!bp.length) rightHTML+=`<div style="text-align:center;color:var(--dim);font-size:11px;padding:10px">Empty bench</div>`;
  } else {
    leftHTML+=`<div class="po-chdr court">STARTING COURT</div>`;
    cp.forEach(p=>{ leftHTML+=pillSmall(p.name, fmt(p.playTime), 'var(--green)'); });
    rightHTML+=`<div class="po-chdr bench">BENCH</div>`;
    bp.forEach(p=>{ rightHTML+=pillSmall(p.name, fmt(p.benchTime), 'var(--blue)'); });
  }

  let topHTML='';
  if(gameStarted){
    const subC=S.alertState==='sub-now'?'var(--red)':S.alertState==='warning'?'var(--warn)':'var(--accent)';
    const subLbl=S.alertState==='sub-now'?'🔔 SUB NOW!':S.alertState==='warning'?'⏱ SUB IN 30s':'NEXT SUB IN';
    topHTML=`<div class="potitle">TIMEOUT</div>
      <div class="potime">${fmt(S.gameTime)}</div>
      <div class="po-subcountdown-lbl">${subLbl}</div>
      <div class="po-subcountdown" style="color:${subC}">${fmt(S.subCountdown)}</div>
      <div class="posub">Tap anywhere to resume</div>`;
  } else {
    const label=S.phase==='h2'?'2ND HALF':'1ST HALF';
    topHTML=`<div class="potitle" style="font-size:56px;text-align:center">${label}</div><div class="postart">Tap anywhere to start the clock</div>`;
  }

  return `
<div id="pause-ovl" class="povl" style="display:${S.isRunning?'none':'flex'}" onclick="resumeFromOverlay()">
  <div class="po-top">${topHTML}</div>
  <div class="po-roster">
    <div class="po-col" style="border-right:1px solid rgba(255,255,255,.08)">${leftHTML}</div>
    <div class="po-col">${rightHTML}</div>
  </div>
</div>`;
}

function teamsToJSON(teams){
  // Bundle ratings for all players in the exported teams
  const ratings = {};
  teams.forEach(t => {
    t.players.forEach(p => {
      const k = ratingKey(t.id, p.id);
      if(ratingsStore[k] && Object.keys(ratingsStore[k]).length > 0){
        ratings[k] = ratingsStore[k];
      }
    });
  });
  return JSON.stringify({_squadmgr:true, version:2, teams, ratings}, null, 2);
}

function closeExportModal(){
  const m = $('export-modal');
  if(m) m.remove();
  window._exportJSON = null;
}

function doShareExport(filename){
  const jsonStr = window._exportJSON;
  if(!jsonStr) return;

  // Try file share first (iOS 15+)
  try {
    const blob = new Blob([jsonStr], {type:'application/json'});
    const file = new File([blob], filename, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:'Squad Manager Teams'})
        .then(()=>closeExportModal())
        .catch(()=>{}); // user cancelled
      return;
    }
  } catch(_){}

  // Try text share (works everywhere)
  try {
    if(navigator.share){
      navigator.share({title:'Squad Manager Teams', text: jsonStr})
        .then(()=>closeExportModal())
        .catch(()=>{});
      return;
    }
  } catch(_){}

  // No share API - nudge them to use Copy instead
  const btn = $('export-share-btn');
  if(btn){ btn.textContent='Use Copy ↓'; btn.style.background='var(--dim)'; }
}

function doCopyExport(){
  const jsonStr = window._exportJSON;
  if(!jsonStr) return;
  const btn = $('export-copy-btn');

  // Modern clipboard API
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(jsonStr).then(()=>{
      if(btn){ btn.textContent='✓ Copied!'; btn.style.background='var(--green)'; btn.style.color='#0a1a0a'; }
      setTimeout(()=>{
        if(btn){ btn.textContent='⎘ Copy'; btn.style.background=''; btn.style.color=''; }
      }, 2000);
    }).catch(()=>fallbackCopy(jsonStr, btn));
    return;
  }
  fallbackCopy(jsonStr, btn);
}

function fallbackCopy(text, btn){
  try {
    const ta = $('export-json-text');
    if(ta){ ta.select(); document.execCommand('copy'); }
    if(btn){ btn.textContent='✓ Copied!'; btn.style.background='var(--green)'; btn.style.color='#0a1a0a'; }
    setTimeout(()=>{
      if(btn){ btn.textContent='⎘ Copy'; btn.style.background=''; btn.style.color=''; }
    }, 2000);
  } catch(_){
    if(btn){ btn.textContent='Select & copy manually'; }
  }
}

function exportTeams(){
  if(!T.teams.length){ alert('No teams to export.'); return; }
  const filename = `squad-manager-teams-${new Date().toISOString().slice(0,10)}.json`;
  showExportModal(
    teamsToJSON(T.teams),
    filename,
    `${T.teams.length} team${T.teams.length!==1?'s':''} · Tap Share to send via AirDrop, Mail, etc. or Copy to paste elsewhere`
  );
}

function exportSingleTeam(id){
  const team = T.teams.find(t=>t.id===id);
  if(!team) return;
  const safeName = team.club.replace(/[^a-z0-9]/gi,'_').toLowerCase();
  showExportModal(
    teamsToJSON([team]),
    `squad-${safeName}.json`,
    `${team.club} · ${team.players.length} players`
  );
}

function doPasteImport(){
  const ta = $('paste-json-text');
  if(!ta||!ta.value.trim()){ alert('Please paste the JSON text first.'); return; }
  processImportJSON(ta.value.trim());
  closeExportModal();
}

function processImportJSON(text){
  try {
    const data = JSON.parse(text);
    if(!data._squadmgr || !Array.isArray(data.teams))
      throw new Error('Not a valid Squad Manager teams file');
    const incoming = data.teams;
    if(!incoming.length){ alert('No teams found in data.'); return; }
    let added=0, updated=0;
    incoming.forEach(t => {
      const idx = T.teams.findIndex(x=>x.id===t.id);
      if(idx>=0){ T.teams[idx]=t; updated++; }
      else { T.teams.push(t); added++; }
    });
    saveTeams();

    // Restore ratings if bundled in the export
    if(data.ratings && typeof data.ratings === 'object'){
      let ratingsRestored = 0;
      Object.entries(data.ratings).forEach(([k, v]) => {
        ratingsStore[k] = v;
        ratingsRestored++;
      });
      if(ratingsRestored > 0) saveRatings();
    }

    renderTeamList();
    const banner = document.createElement('div');
    banner.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a2e1a;border:1.5px solid #3ecf6e;color:#3ecf6e;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;';
    banner.textContent = `✓ ${added} added, ${updated} updated`;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(), 3000);
  } catch(e){ alert('Import failed: ' + e.message); }
}

function handleImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => processImportJSON(ev.target.result);
  reader.onerror = ()=>{ alert('Could not read file.'); };
  reader.readAsText(file);
}

function openTeamEdit(id){
  if(id){
    const t=T.teams.find(x=>x.id===id);
    T.editingTeam={...t, players:t.players.map(p=>({...p}))};
  } else {
    T.editingTeam={id:uid(),club:'',league:'',season:'',ageBracket:'',year:new Date().getFullYear()+'',players:[]};
  }
  T.editingPlayerId=null;
  T.playerDraft={};
  renderTeamEdit();
}

function deleteTeam(id){
  if(!confirm('Delete this team?')) return;
  T.teams=T.teams.filter(t=>t.id!==id);
  if(T.activeTeamId===id){ T.activeTeamId=null; S.names=['','','','','']; }
  saveTeams();
  renderTeamList();
}

function saveTeamEdit(){
  const t=T.editingTeam;
  if(!t.club.trim()){ alert('Please enter a club name'); return; }
  const idx=T.teams.findIndex(x=>x.id===t.id);
  if(idx>=0) T.teams[idx]=t; else T.teams.push(t);
  saveTeams();
  // If this was the active team, refresh names
  if(T.activeTeamId===t.id) setActiveTeam(t.id);
  T.editingTeam=null;
  renderTeamList();
}

function openPlayerEdit(pid){
  if(pid){
    T.editingPlayerId=pid;
    const p=T.editingTeam.players.find(x=>x.id===pid);
    T.playerDraft={...p};
  } else {
    T.editingPlayerId='__new__';
    T.playerDraft={id:uid(),firstName:'',lastName:'',nickname:'',singletNumber:''};
  }
  renderTeamEdit();
}

function savePlayerEdit(){
  const d=T.playerDraft;
  if(!d.firstName.trim()){ alert('First name required'); return; }
  if(!d.singletNumber.toString().trim()){ alert('Singlet number required'); return; }
  const idx=T.editingTeam.players.findIndex(p=>p.id===d.id);
  if(idx>=0) T.editingTeam.players[idx]={...d};
  else T.editingTeam.players.push({...d});
  T.editingPlayerId=null; T.playerDraft={};
  renderTeamEdit();
}

}

function autoModeTimeHTML(filtered){
  if(filtered.length<COURT_SIZE) return '';
  const totalSecs=(S.h1Dur+S.h2Dur)*60;
  const n=filtered.length;
  const base=Math.floor(totalSecs*COURT_SIZE/n);
  const extra=totalSecs*COURT_SIZE - base*n; // leftover seconds to distribute
  const priorityCount=S.priorityPlayerIds.size;

  // Each priority player gets extra time distributed from the remaining
  const times=filtered.map((_,i)=>S.priorityPlayerIds.has(i)
    ?base+Math.floor(extra/Math.max(1,priorityCount))
    :base);

  const prioritySection=`
    <div class="s-sec">
      <div class="s-hdr">AUTO-MODE: PRIORITY PLAYERS</div>
      <div class="s-lbl"><span>Tap players who should receive extra time when subs can't be even</span><span style="color:var(--accent)">${S.priorityPlayerIds.size} selected</span></div>
      <div class="chips">
        ${filtered.map((nm,i)=>{
          const sel=S.priorityPlayerIds.has(i);
          return `<div class="chip${sel?' on':''}" onclick="togglePriorityPlayer(${i})">${sel?'★ ':''}${nm}</div>`;
        }).join('')}
      </div>
    </div>`;

  const summary=`
    <div class="s-sec">
      <div class="s-hdr">AUTO-MODE: EXPECTED PLAYING TIME</div>
      <div style="background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;">
        <div style="font-size:9px;color:var(--dim);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;">Based on ${n} players, ${fmt(totalSecs)} total game · Sub every ${fmtInterval(S.h1Int)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${times.map((secs,i)=>{
            const isPri=S.priorityPlayerIds.has(i);
            return `<div style="background:var(--surface);border-radius:6px;padding:4px 8px;font-size:10px;border:1.5px solid ${isPri?'var(--accent)':'var(--border)'}">
              <span style="font-weight:700;color:${isPri?'var(--accent)':'var(--text)'}">${filtered[i].split(' ')[0]}</span>
              <span style="color:var(--green);margin-left:4px;font-family:Impact,sans-serif;font-size:12px">${fmt(secs)}</span>
              ${isPri?'<span style="color:var(--accent);font-size:9px;margin-left:2px">★</span>':''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;

  return prioritySection+summary;
}

function buildPlayerRatingSummary(filtered){
  const team = T.teams.find(t=>t.id===T.activeTeamId);
  const POS_OPTIONS = ['1 – Point Guard','2 – Shooting Guard','3 – Small Forward','4 – Power Forward','5 – Centre'];
  const ALT_OPTIONS = ['None','1 – Point Guard','2 – Shooting Guard','3 – Small Forward','4 – Power Forward','5 – Centre'];

  return filtered.map(name=>{
    const player = team && team.players.find(p=>playerDisplayName(p)===name);
    const ratings = player ? getPlayerRatings(T.activeTeamId, player.id) : {};
    const hasRatings = Object.keys(ratings).length > 0;
    if(!hasRatings) return `  ${name}: no ratings entered`;

    // Build position string prominently
    const pri  = POS_OPTIONS[parseInt(ratings.position)||0]  || POS_OPTIONS[0];
    const alt1 = ALT_OPTIONS[parseInt(ratings.position2)||0] || 'None';
    const alt2 = ALT_OPTIONS[parseInt(ratings.position3)||0] || 'None';
    const posStr = alt1!=='None' && alt2!=='None'
      ? `Positions: ${pri} (primary), ${alt1} (alt1), ${alt2} (alt2)`
      : alt1!=='None'
        ? `Positions: ${pri} (primary), ${alt1} (alt1)`
        : `Positions: ${pri} (primary)`;

    // Summarise remaining skill groups (skip position fields — already shown above)
    const groups = RATING_GROUPS.map(g=>{
      const scores = g.fields
        .filter(f=>!['position','position2','position3','height'].includes(f.key))
        .map(f=>{
          if(f.type==='select'){
            const val = ratings[f.key] !== undefined ? parseInt(ratings[f.key]) : 0;
            return `${f.label}=${f.options[val]||f.options[0]}`;
          }
          const val = ratings[f.key] !== undefined ? ratings[f.key] : 5;
          return `${f.label}=${val}/10`;
        });
      return scores.length ? `${g.label}[${scores.join(', ')}]` : '';
    }).filter(Boolean).join('; ');

    const height = ['Small','Medium','Tall'][parseInt(ratings.height)||0] || 'Medium';

    return `  ${name}: ${posStr}; Height=${height}; ${groups}`;
  }).join('\n');
}

async function generateAIRotation(){
  if(!CFG.apiKey){
    alert('Please add your Anthropic API key in ⚙ Settings first.');
    return;
  }

  const filtered = S.names.filter(n=>n.trim());
  if(filtered.length < COURT_SIZE){
    alert(`Add at least ${COURT_SIZE} players to the roster first.`);
    return;
  }

  // Show loading modal
  showAIRotationModal(null, true);

  // Build prompt
  const h1Subs = Math.max(0, Math.ceil(S.h1Dur*60/S.h1Int)-1);
  const h2Subs = Math.max(0, Math.ceil(S.h2Dur*60/S.h2Int)-1);
  const totalSecs = (S.h1Dur+S.h2Dur)*60;
  const fairShare = Math.round(totalSecs*COURT_SIZE/filtered.length);

  const h2PresetNote = S.useH2Preset && S.h2PresetIds.size===COURT_SIZE
    ? `2nd half starting 5: ${[...S.h2PresetIds].map(i=>filtered[i]).join(', ')}`
    : 'No 2nd half preset';
  const finalNote = S.useFinalPreset && S.finalPresetIds.size===COURT_SIZE
    ? `Final 5 (must finish game): ${[...S.finalPresetIds].map(i=>filtered[i]).join(', ')}`
    : 'No final 5 preset';

  const playerSummary = buildPlayerRatingSummary(filtered);
  const hasAnyRatings = filtered.some(name=>{
    const team = T.teams.find(t=>t.id===T.activeTeamId);
    const player = team && team.players.find(p=>playerDisplayName(p)===name);
    return player && Object.keys(getPlayerRatings(T.activeTeamId, player.id)).length > 0;
  });

  const prompt = [
    'You are a basketball coaching assistant helping plan substitutions for a junior game.',
    '',
    'GAME SETTINGS:',
    `  Players: ${filtered.join(', ')}`,
    `  Game: ${S.h1Dur} min H1 + ${S.h2Dur} min H2 = ${S.h1Dur+S.h2Dur} min total`,

    `  Fair share per player: ~${Math.floor(fairShare/60)}:${String(fairShare%60).padStart(2,'0')}`,
    `  ${h2PresetNote}`,
    `  ${finalNote}`,
    '',
    hasAnyRatings ? 'PLAYER RATINGS (0-10 per attribute):' : 'PLAYER RATINGS: Not yet entered — base plan on equal time distribution.',
    hasAnyRatings ? playerSummary : '',
    '',
    'YOUR TASK:',
    `Generate a substitution plan with exactly ${h1Subs} H1 sub${h1Subs!==1?'s':''} and ${h2Subs} H2 sub${h2Subs!==1?'s':''}.`,
    `Each sub must swap exactly ${S.h1Sps} player${S.h1Sps!==1?'s':''} (H1) and ${S.h2Sps} player${S.h2Sps!==1?'s':''} (H2).`,
    'Goals (in priority order):',
    '  1. Distribute playing time as evenly as possible across all players',
    hasAnyRatings ? '  2. At every sub, ensure the 5 players on court cover as many different positions (1-5) as possible using primary AND alternate positions. Avoid leaving a position completely uncovered.' : '',
    hasAnyRatings ? '  3. Put stronger offensive players on together when possible' : '',
    hasAnyRatings ? '  4. Ensure good defensive coverage on court at all times' : '',
    '  5. Respect any H2 starting 5 and final 5 presets',
    '  6. Avoid putting players back on immediately after they just came off',
    hasAnyRatings ? '  Note: A player can cover a position if it is their primary OR either alternate position.' : '',
    '',
    'Return ONLY a JSON object, no markdown, no explanation:',
    '{',
    '  "rationale": "2-3 sentence explanation of your rotation strategy",',
    '  "h1": [',
    '    {"subNum": 1, "atTime": "3:00", "off": ["Player A"], "on": ["Player B"], "note": "optional short note"},',
    '    {"subNum": 2, "atTime": "6:00", "off": ["Player C"], "on": ["Player D"], "note": ""}',
    '  ],',
    '  "h2": [',
    '    {"subNum": 1, "atTime": "3:00", "off": ["Player E"], "on": ["Player F"], "note": ""}',
    '  ],',
    '  "expectedTimes": {"Player A": "12:00", "Player B": "8:00"}',
    '}',
    '',
    `The starting 5 on court are: ${filtered.slice(0, COURT_SIZE).join(', ')}.`,
    `Bench players at start: ${filtered.slice(COURT_SIZE).join(', ') || 'none'}.`,
    `CRITICAL: In your JSON response, use EXACTLY these player names (copy-paste them):`,
    `All players: ${filtered.join(', ')}`,
    'Do not shorten, modify, or reformat the names in any way.'
  ].filter(l=>l!==null).join('\n');

  const timeoutPromise = new Promise((_,rej)=>setTimeout(()=>rej(new Error('TIMEOUT')),60000));
  const fetchPromise = fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':CFG.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      messages:[{role:'user',content:prompt}]
    })
  });

  let resp;
  try { resp = await Promise.race([fetchPromise,timeoutPromise]); }
  catch(err){
    closeAIRotationModal();
    alert(err.message==='TIMEOUT'
      ? 'Request timed out. Check your API key in ⚙ Settings and try again.'
      : 'Network error: '+err.message);
    return;
  }

  if(!resp.ok){
    let msg='HTTP '+resp.status;
    try{ const d=await resp.json(); msg+=': '+(d.error?.message||JSON.stringify(d)); }catch(_){}
    if(resp.status===401) msg='Invalid API key — check ⚙ Settings.';
    if(resp.status===429) msg='Rate limit. Wait 30s and try again.';
    closeAIRotationModal();
    alert('API Error: '+msg);
    return;
  }

  let data;
  try{ data=await resp.json(); }
  catch(e){ closeAIRotationModal(); alert('Bad response: '+e.message); return; }
  if(data.error){ closeAIRotationModal(); alert('Claude error: '+data.error.message); return; }

  const rawText=(data.content||[]).map(c=>c.text||'').join('').trim();
  let clean=rawText.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
  const oi=clean.indexOf('{'), ci=clean.lastIndexOf('}');
  if(oi!==-1&&ci>oi) clean=clean.slice(oi,ci+1);

  let result;
  try{ result=JSON.parse(clean); }
  catch(e){ closeAIRotationModal(); alert('Could not parse AI response. Try again.\n\n'+rawText.slice(0,300)); return; }

  showAIRotationModal(result, false, filtered);
}

function applyAIRotation(result, filtered){
  // Convert AI result into S.subPlan format
  // S.names entries look like "Maggie #18" or "Saskia #10"
  // AI may return just first name, first+last, or the full display name
  const nameToIdx = {};
  filtered.forEach((n,i)=>{ nameToIdx[n]=i; });

  // Fuzzy lookup: try exact match first, then first-word match, then partial
  function findIdx(aiName){
    // 1. Exact match
    if(nameToIdx[aiName] !== undefined) return nameToIdx[aiName];
    // 2. Case-insensitive exact
    const lower = aiName.toLowerCase();
    for(const [n,i] of Object.entries(nameToIdx)){
      if(n.toLowerCase()===lower) return i;
    }
    // 3. Check if any filtered name starts with or contains the AI name
    for(const [n,i] of Object.entries(nameToIdx)){
      const nLower = n.toLowerCase();
      // e.g. "Maggie #18" contains "Maggie"
      if(nLower.startsWith(lower) || nLower.includes(lower)) return i;
    }
    // 4. Check if AI name contains any filtered name's first word
    for(const [n,i] of Object.entries(nameToIdx)){
      const firstName = n.split(' ')[0].toLowerCase();
      if(lower.startsWith(firstName) || lower.includes(firstName)) return i;
    }
    return undefined;
  }

  function parseHalf(subs){
    return (subs||[]).map(sub=>{
      const off = new Set((sub.off||[]).map(findIdx).filter(i=>i!==undefined));
      const on  = new Set((sub.on||[]).map(findIdx).filter(i=>i!==undefined));
      return {off, on};
    });
  }

  const h1Plan = parseHalf(result.h1);
  const h2Plan = parseHalf(result.h2);

  // Check how many subs actually matched
  const totalSubs = h1Plan.length + h2Plan.length;
  const filledSubs = [...h1Plan,...h2Plan].filter(s=>s.off.size>0&&s.on.size>0).length;

  S.subPlan = { h1: h1Plan, h2: h2Plan };
  S.useSubPlan = true;
  closeAIRotationModal();
  renderSetup(true);

  if(filledSubs === 0 && totalSubs > 0){
    showToast(`⚠ Plan loaded but player names didn't match — check roster`);
  } else {
    showToast(`AI rotation plan loaded ✓ (${filledSubs}/${totalSubs} subs matched)`);
  }
}

function showAIRotationModal(result, loading, filtered){
  const existing = document.getElementById('ai-rot-modal');
  if(existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'ai-rot-modal';
  modal.className = 'ai-rot-backdrop';
  modal.onclick = e=>{ if(e.target===modal) closeAIRotationModal(); };

  let bodyHTML = '';

  if(loading){
    bodyHTML = `<div class="ai-rot-spinner">
      <div class="spin">⟳</div>
      <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px;">Generating rotation plan…</div>
      <div style="font-size:12px;">Analysing player ratings and game settings</div>
    </div>`;
  } else {
    // Rationale
    if(result.rationale){
      bodyHTML += `<div class="ai-rot-section">
        <div class="ai-rot-section-title">STRATEGY</div>
        <div style="font-size:12px;color:var(--text);line-height:1.6;">${result.rationale}</div>
      </div>`;
    }

    // Render subs for each half
    ['h1','h2'].forEach(half=>{
      const subs = result[half]||[];
      if(!subs.length) return;
      const halfLabel = half==='h1'?'1ST HALF':'2ND HALF';
      const rows = subs.map(s=>`
        <div class="ai-rot-sub-row">
          <span class="ai-rot-sub-num">SUB ${s.subNum}<br><span style="font-size:9px;color:var(--dim)">@${s.atTime}</span></span>
          <span class="ai-rot-off">▼ ${(s.off||[]).join(', ')}</span>
          <span class="ai-rot-on">▲ ${(s.on||[]).join(', ')}</span>
        </div>
        ${s.note?`<div style="font-size:10px;color:var(--dim);padding:0 0 4px 52px;font-style:italic">${s.note}</div>`:''}`).join('');
      bodyHTML += `<div class="ai-rot-section">
        <div class="ai-rot-section-title">${halfLabel} — ${subs.length} SUB${subs.length!==1?'S':''}</div>
        ${rows}
      </div>`;
    });

    // Expected times
    if(result.expectedTimes && Object.keys(result.expectedTimes).length){
      const timeRows = Object.entries(result.expectedTimes)
        .sort((a,b)=>b[1].localeCompare(a[1]))
        .map(([name,time])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);">
          <span style="font-size:12px;color:var(--text);">${name}</span>
          <span style="font-family:Impact,sans-serif;font-size:13px;color:var(--green);">${time}</span>
        </div>`).join('');
      bodyHTML += `<div class="ai-rot-section">
        <div class="ai-rot-section-title">EXPECTED PLAYING TIME</div>
        ${timeRows}
      </div>`;
    }
  }

  const footerHTML = loading ? '' : `
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="ai-rot-load-btn" onclick="applyAIRotation(window._aiRotResult, window._aiRotFiltered)">✓ USE THIS PLAN</button>
      <button class="ai-rot-cancel-btn" onclick="closeAIRotationModal()">CANCEL</button>
    </div>
    <div style="font-size:10px;color:var(--dim);text-align:center;">You can edit individual subs after loading</div>`;

  modal.innerHTML = `
    <div class="ai-rot-box">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div class="ai-rot-title">🤖 AI ROTATION PLAN</div>
        <button onclick="closeAIRotationModal()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:2px;">✕</button>
      </div>
      <div class="ai-rot-body">${bodyHTML}</div>
      ${footerHTML}
    </div>`;

  if(!loading && result){
    window._aiRotResult = result;
    window._aiRotFiltered = filtered;
  }

  document.body.appendChild(modal);
}

  const m = document.getElementById('ai-rot-modal');
  if(m) m.remove();
  window._aiRotResult = null;
  window._aiRotFiltered = null;
}

      <div style="margin-top:${S.useSubPlan?10:0}px;">
        <div class="s-lbl">Saved Plans</div>
        ${P.plans.map(p=>`
          <div style="background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
              <div style="font-size:10px;color:var(--dim);margin-top:1px;">${p.createdAt} · ${p.h1Dur+p.h2Dur}min game · ${p.players.length} players</div>
            </div>
            <button onclick="loadPlan('${p.id}')" style="background:var(--greenDim);border:1.5px solid var(--green);color:var(--green);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">Load</button>
            <button onclick="deletePlan('${p.id}')" style="background:none;border:none;color:var(--dim);font-size:15px;cursor:pointer;padding:2px 4px;">🗑</button>
