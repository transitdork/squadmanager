function renderGame(){
  const isH2=S.phase==='h2';
  const cp=courtPlayers(), bp=benchPlayers();
  const hiC=highlightCourt(), hiB=highlightBench();
  const {targetTime,remPP}=calcForecast();
  const active=S.players.filter(p=>p.fouls<5).length;
  const totalSecs=(S.h1Dur+S.h2Dur)*60;
  const halfRem=getHalfDur()-S.halfTime;
  const halfC=halfRem<=60?'#ff5555':halfRem<=120?'#ffcc00':'#eef0f8';
  const subC=S.alertState==='sub-now'?'#ff5555':S.alertState==='warning'?'#ffcc00':'#eef0f8';
  const gameStarted=S.gameTime>0||S.isRunning;

  const alertHTML=S.alertState==='warning'?`<div id="alert-bar" class="abar warn">⏱ SUB IN 30 SECONDS</div>`
    :S.alertState==='sub-now'?`<div id="alert-bar" class="abar now">🔔 TIME TO SUBSTITUTE!</div>`
    :S.alertState==='halfend'?`<div id="alert-bar" class="abar half">🏀 ${isH2?'FULL TIME — TAP END GAME':'HALF TIME — TAP END HALF'}</div>`
    :`<div id="alert-bar" class="abar" style="display:none"></div>`;

  const showSub=S.selCourt.size>0||S.selBench.size>0;
  const availableSpots=COURT_SIZE-cp.length;
  const fillingUp=S.selCourt.size===0&&availableSpots>0&&S.selBench.size>0&&S.selBench.size<=availableSpots;
  const canSub=S.selBench.size>0&&(S.selCourt.size>0||fillingUp);
  const tooMany=S.selCourt.size===0&&S.selBench.size>availableSpots&&availableSpots>0;

  let subBarInfo='';
  if(fillingUp) subBarInfo=`<strong>${S.selBench.size}</strong> joining court (${cp.length}→${cp.length+S.selBench.size}/5)`;
  else if(tooMany) subBarInfo=`Only <strong>${availableSpots}</strong> spot${availableSpots!==1?'s':''} free — deselect ${S.selBench.size-availableSpots} player${S.selBench.size-availableSpots!==1?'s':''}`;
  else subBarInfo=`<strong>${S.selCourt.size}</strong> off · <strong>${S.selBench.size}</strong> on${S.selCourt.size>0&&S.selCourt.size!==S.selBench.size?' <span style="color:#ffcc00">— uneven</span>':''}`;

  const subBarHTML=showSub?`
<div class="subbar">
  <div class="subbar-info">${subBarInfo}</div>
  <button class="sub-clr" onclick="clearSel()">Clear</button>
  <button class="sub-go" onclick="commitSub()" ${canSub?'':'disabled'}>MAKE SUB ✓</button>
</div>`:'';

  const cCards=cp.map(p=>playerCardHTML(p,'court',hiC.has(p.id),S.selCourt.has(p.id),{targetTime,remPP},getPlanHighlights())).join('');
  const bCards=bp.length
    ?bp.map(p=>playerCardHTML(p,'bench',hiB.has(p.id),S.selBench.has(p.id),{targetTime,remPP},getPlanHighlights())).join('')
    :`<div style="text-align:center;color:#7a80a0;font-size:12px;padding:12px">Empty bench</div>`;

  let instrTxt='';
  if(!showSub){
    instrTxt=cp.length<COURT_SIZE
      ?`${availableSpots} spot${availableSpots!==1?'s':''} free — tap bench players to add to court`
      :'Tap court players to sub out · Tap bench players to sub in · Then MAKE SUB';
  } else if(fillingUp){
    instrTxt=`Tap MAKE SUB to add ${S.selBench.size} player${S.selBench.size!==1?'s':''} to court`;
  } else if(tooMany){
    instrTxt=`Too many selected — only ${availableSpots} spot${availableSpots!==1?'s':''} available`;
  } else if(canSub){
    instrTxt=`Tap MAKE SUB — ${S.selCourt.size} off, ${S.selBench.size} on`;
  } else {
    instrTxt='Select players on both sides to enable sub';
  }

  const pbtnLabel=!gameStarted?'▶ START':S.isRunning?'⏸ TIMEOUT':'▶ RESUME';
  const endLabel=isH2?'END GAME':'END HALF';
  const endCls=`endbtn ${isH2?'h2e':'h1e'}${S.alertState==='halfend'?' urgent':''}`;
  const endAction=isH2?'confirmEndGame()':'confirmEndHalf()';

  $('app').innerHTML=`
<div class="game">
  <div class="ghdr">
    <div class="hll">
      <div id="gclock" class="gclock bb">${fmt(S.gameTime)}</div>
      <div class="glbl">Total</div>
      <div class="hbadge ${isH2?'h2':'h1'}">${isH2?'2ND HALF':'1ST HALF'}</div>
      ${S.opponent?`<div style="font-size:9px;color:var(--dim);margin-top:2px">vs <strong style="color:var(--text)">${S.opponent}</strong></div>`:''}
    </div>
    <div class="ghctr">
      <div class="glbl">Half remaining</div>
      <div id="hrem" class="hrem bb" style="color:${halfC}">${halfRem>=0?fmt(halfRem):'+'+fmt(-halfRem)}</div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:1px">
        <div class="glbl">Sub in</div>
        <div id="scdown" class="stimer bb" style="color:${subC}">${fmt(S.subCountdown)}</div>
      </div>
    </div>
    <div class="hbtns">
      <button id="pbtn" class="pbtn${S.isRunning?' live':''}" onclick="togglePause()">${pbtnLabel}</button>
      <div style="display:flex;gap:4px;align-items:center;margin-top:2px">
        <button class="${endCls}" onclick="${endAction}">${endLabel}</button>
        <button class="sgear" onclick="S._prevPhase='${S.phase}';S.phase='settings';render()" title="Settings">⚙</button>
      </div>
    </div>
  </div>

  <div class="target-bar">
    <span class="target-lbl">Target per player</span>
    <span class="target-val">${fmt(targetTime)}</span>
    <span style="color:var(--border);font-size:10px">·</span>
    <span class="target-info">${active} active · ${fmt(totalSecs)} total</span>
    <span style="color:var(--border);font-size:10px">·</span>
    ${S.useSubPlan?`<span onclick="S.showPlanned=!S.showPlanned;renderGame()" style="font-size:9px;cursor:pointer;padding:1px 7px;border-radius:4px;border:1px solid;${S.showPlanned?'background:rgba(244,114,182,.15);border-color:#f472b6;color:#f472b6':'border-color:var(--border);color:var(--dim)'}">Plan ${S.showPlanned?'ON':'OFF'}</span>`:''}
    <span onclick="S.showRecommended=!S.showRecommended;renderGame()" style="font-size:9px;cursor:pointer;padding:1px 7px;border-radius:4px;border:1px solid;${S.showRecommended?'background:rgba(255,140,0,.1);border-color:var(--amber);color:var(--amber)':'border-color:var(--border);color:var(--dim)'}">Auto ${S.showRecommended?'ON':'OFF'}</span>
  </div>

  ${alertHTML}
  ${subBarHTML}

  <div class="cols">
    <div class="col" style="border-right:1px solid var(--border)">
      <div class="chdr court">ON COURT · ${cp.length}/5</div>
      ${cCards}
    </div>
    <div class="col bench-col">
      <div class="chdr bench">BENCH · ${bp.length}</div>
      ${bCards}
    </div>
  </div>

  <div class="instr">${instrTxt}</div>
  ${pauseOverlayHTML()}
</div>`;

  updateAlertBar();
  if(S.isRunning) startTick();
}

function renderHalftime(){
  const court=S.players.filter(p=>S.htOnCourt.has(p.id));
  const bench=S.players.filter(p=>!S.htOnCourt.has(p.id));
  const ready=court.length===COURT_SIZE;
  const need=COURT_SIZE-court.length;
  const h1Secs=S.h1Dur*60;

  const sortedCourt=[...court].sort((a,b)=>b.playTime-a.playTime);
  const sortedBench=[...bench].sort((a,b)=>a.playTime-b.playTime);

  const cCards=sortedCourt.map(p=>{
    const heavy=p.playTime>=h1Secs*0.7;
    return `<div class="ht-card court" onclick="toggleHtPlayer(${p.id})">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="ht-name">${p.name}</div>
        ${heavy?`<span style="font-size:9px;background:rgba(255,140,0,.2);color:var(--amber);padding:1px 6px;border-radius:4px;font-family:Impact,sans-serif;letter-spacing:1px">HEAVY</span>`:''}
      </div>
      <div class="ht-stat">Played <span>${fmt(p.playTime)}</span> · ${p.fouls} foul${p.fouls!==1?'s':''}</div>
    </div>`;
  }).join('');

  const bCards=sortedBench.map(p=>{
    const light=p.playTime<h1Secs*0.3;
    return `<div class="ht-card bench" onclick="toggleHtPlayer(${p.id})">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="ht-name">${p.name}</div>
        ${light?`<span style="font-size:9px;background:rgba(62,207,110,.2);color:var(--green);padding:1px 6px;border-radius:4px;font-family:Impact,sans-serif;letter-spacing:1px">NEEDS TIME</span>`:''}
      </div>
      <div class="ht-stat">Played <span>${fmt(p.playTime)}</span> · ${p.fouls} foul${p.fouls!==1?'s':''}</div>
    </div>`;
  }).join('');

  $('app').innerHTML=`
<div class="ht">
  <div class="ht-hdr">
    <div class="ht-title">HALF TIME</div>
    <div class="ht-sub">H2: ${S.h2Dur}min · sub every ${fmtInterval(S.h2Int)} · ${S.h2Sps} per sub</div>
    <div class="ht-count"><span class="${ready?'ok':'bad'}">${court.length}/5</span> on court for 2nd half${!ready?` · <span style="color:var(--warn)">pick ${need} more</span>`:''}</div>
    <div style="font-size:10px;color:var(--dim);margin-top:4px">Sorted by play time · <span style="color:var(--amber)">HEAVY</span> = lots of H1 time · <span style="color:var(--green)">NEEDS TIME</span> = little H1 time</div>
  </div>
  <div class="ht-cols">
    <div class="ht-col" style="border-right:1px solid var(--border)">
      <div class="ht-chdr court">STARTING H2 (${court.length})</div>
      ${cCards||'<div style="text-align:center;color:var(--dim);font-size:12px;padding:12px">None selected</div>'}
    </div>
    <div class="ht-col">
      <div class="ht-chdr bench">BENCH (${bench.length})</div>
      ${bCards||'<div style="text-align:center;color:var(--dim);font-size:12px;padding:12px">Empty</div>'}
    </div>
  </div>
  <div class="ht-footer">
    <button class="ht-start" onclick="startSecondHalf()" ${ready?'':'disabled'}>
      ${ready?'▶ START 2ND HALF':`SELECT ${need} MORE PLAYER${need!==1?'S':''}`}
    </button>
    <div class="ht-note">Tap any player to move between court and bench</div>
  </div>
</div>`;
}

function renderGameover(){
  const sorted=[...S.players].sort((a,b)=>b.playTime-a.playTime);

    const fc=p.fouls>=5?'#ff5555':p.fouls>=3?'#ffcc00':'#eef0f8';
    return `<tr><td style="font-weight:700">${p.name}</td><td><span class="pt">${fmt(p.h1PlayTime)}</span></td><td><span class="pt">${fmt(p.h2PlayTime)}</span></td><td><span class="pt" style="color:#f08c00;font-size:15px">${fmt(p.playTime)}</span></td><td style="color:${fc};font-weight:${p.fouls>=3?700:400}">${p.fouls}</td></tr>`;
  }).join('');
  const logHTML=S.subLog.length?`
<div class="log-title">SUBSTITUTION LOG · ${S.subLog.length} subs</div>
${S.subLog.map(e=>`<div class="log-entry"><span class="log-time">${fmt(e.gameTime)}</span><span style="color:#7a80a0;margin-left:7px;font-size:9px">H${e.half} · ${fmt(e.halfTime)}</span><div style="margin-top:2px;font-size:10px"><span style="color:#3ecf6e">▲ ${e.on.join(', ')}</span><span style="color:#7a80a0;margin:0 5px">←</span><span style="color:#ff8c00">▼ ${e.off.join(', ')}</span></div></div>`).join('')}`:'';

  $('app').innerHTML=`
<div class="go">

    <table class="stats-tbl">
      <thead><tr><th>Player</th><th>1st Half</th><th>2nd Half</th><th>Total</th><th>Fouls</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${logHTML}
  </div>
  <div class="go-footer">
    <button class="exp-btn" onclick="exportReport()">⬆ EXPORT REPORT</button>
    ${S.useSubPlan?`<button style="background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:Impact,sans-serif;font-size:14px;letter-spacing:1px;border-radius:10px;padding:12px 10px;cursor:pointer;white-space:nowrap;" onclick="showSavePlanModal(null)">💾 Save Plan</button>`:''}
    <button class="new-btn" onclick="newGame()">NEW GAME</button>
  </div>
</div>`;
}

  { label: 'Physical', fields: [

    { key:'energy',    label:'Energy on Court',             type:'slider' },

  { label: 'Court IQ', fields: [

];

const RATINGS_KEY = 'squadmgr_ratings_v1';
let ratingsStore = {}; // { teamId_playerId: { key: value, ... } }

function saveRatings(){
  try{ localStorage.setItem(RATINGS_KEY, JSON.stringify(ratingsStore)); }catch(_){}
}
function loadRatings(){
  try{
    const raw = localStorage.getItem(RATINGS_KEY);
    if(raw) ratingsStore = JSON.parse(raw)||{};
  }catch(_){}
}
function ratingKey(teamId, playerId){ return `${teamId}_${playerId}`; }
function getPlayerRatings(teamId, playerId){
  return ratingsStore[ratingKey(teamId,playerId)] || {};
}
function setPlayerRating(teamId, playerId, field, value){
  const k = ratingKey(teamId,playerId);
  if(!ratingsStore[k]) ratingsStore[k]={};
  ratingsStore[k][field] = value;
  saveRatings();
}

// Ratings edit screen state
let R = { teamId: null, playerId: null, draft: {} };

function openRatings(teamId, playerId){
  R.teamId = teamId;
  R.playerId = playerId;
  const existing = getPlayerRatings(teamId, playerId);
  // Pre-fill defaults for every field so they're saved even if user doesn't touch them
  const defaults = {};
  RATING_GROUPS.forEach(g => g.fields.forEach(f => {
    defaults[f.key] = f.type === 'select' ? 0 : 5;
  }));
  R.draft = {...defaults, ...existing};
  S.phase = 'ratings';
  render();
}

function renderRatings(){
  const team = T.teams.find(t=>t.id===R.teamId);
  const player = team && team.players.find(p=>p.id===R.playerId);
  if(!team||!player){ S.phase='teamEdit'; render(); return; }

  const groupsHTML = RATING_GROUPS.map(g=>{
    const fieldsHTML = g.fields.map(f=>{
      const val = R.draft[f.key] !== undefined ? R.draft[f.key] : (f.type==='select'?f.options[0]:5);
      if(f.type==='select'){
        const opts = f.options.map((o,i)=>`<option value="${i}"${val==i?' selected':''}>${o}</option>`).join('');
        return `<div class="rat-row">
          <span class="rat-lbl">${f.label}</span>
          <select class="rat-select" onchange="R.draft['${f.key}']=parseInt(this.value)">${opts}</select>
        </div>`;
      }
      // slider 0-10
      const numVal = typeof val==='number' ? val : 5;
      const col = numVal>=8?'var(--green)':numVal>=5?'var(--warn)':'var(--red)';
      return `<div class="rat-row">
        <span class="rat-lbl">${f.label}</span>
        <input type="range" min="0" max="10" value="${numVal}" class="rat-slider"
          oninput="R.draft['${f.key}']=parseInt(this.value);this.nextElementSibling.textContent=this.value;this.nextElementSibling.style.color=this.value>=8?'var(--green)':this.value>=5?'var(--warn)':'var(--red)'">
        <span class="rat-val" style="color:${col}">${numVal}</span>
      </div>`;
    }).join('');
    return `<div class="rat-group">
      <div class="rat-group-hdr">${g.label}</div>
      ${fieldsHTML}
    </div>`;
  }).join('');

  $('app').innerHTML=`
<div class="ratings-screen">
  <div class="ratings-hdr">
    <button class="tm-back" onclick="T.editingTeam=T.teams.find(t=>t.id===R.teamId);T.editingPlayerId=null;S.phase='teamEdit';render()">←</button>
    <div>
      <div class="ratings-player-name">${player.nickname||player.firstName} #${player.singletNumber}</div>
      <div style="font-size:11px;color:var(--dim)">${player.firstName} ${player.lastName} · ${team.club}</div>
    </div>
  </div>
  <div class="ratings-body">
    <div style="font-size:11px;color:var(--dim);margin-bottom:12px;line-height:1.5;">Rate each attribute 0–10. These ratings are used by the AI to generate optimal rotation plans.</div>
    ${groupsHTML}
    <button class="rat-save-btn" onclick="saveRatings_player()">SAVE RATINGS</button>
  </div>
</div>`;
}

function saveRatings_player(){
  Object.entries(R.draft).forEach(([k,v])=>setPlayerRating(R.teamId, R.playerId, k, v));
  showToast('Ratings saved ✓');
  T.editingTeam = T.teams.find(t=>t.id===R.teamId);
  T.editingPlayerId = null;
  S.phase = 'teamEdit';
  render();
}


function render(){
  stopTick();
  if(S.phase==='setup')         renderSetup(true);
  else if(S.phase==='teamList') renderTeamList();
  else if(S.phase==='teamEdit') renderTeamEdit();
  else if(S.phase==='settings') renderSettings();
  else if(S.phase==='ratings')  renderRatings();
  else if(S.phase==='halftime') renderHalftime();
  else if(S.phase==='gameover') renderGameover();
  else renderGame();
}

// ── Confirmation Modal ──
function showConfirm({title, body, okLabel, okClass, onOk}){
  const el=$('confirm-modal');
  el.innerHTML=`
<div class="confirm-backdrop" onclick="hideConfirm()">
  <div class="confirm-box" onclick="event.stopPropagation()">
    <div class="confirm-title ${okClass}">${title}</div>
    <div class="confirm-body">${body}</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="hideConfirm()">CANCEL</button>
      <button class="confirm-ok ${okClass}" id="confirm-ok-btn">${okLabel}</button>
    </div>
  </div>
</div>`;
  el.style.display='block';
  $('confirm-ok-btn').onclick=()=>{ hideConfirm(); onOk(); };
}
function hideConfirm(){ $('confirm-modal').style.display='none'; $('confirm-modal').innerHTML=''; }

function confirmEndHalf(){
  showConfirm({
    title:'END HALF?', okClass:'warn',
    body:`Game time: <strong>${fmt(S.gameTime)}</strong><br>Half time: <strong>${fmt(S.halfTime)}</strong><br><br>This will take you to the halftime screen.`,
    okLabel:'END HALF',
    onOk: endHalf
  });
}
function confirmEndGame(){

function toggleTeamPlayerChip(playerId){
  const team=T.teams.find(t=>t.id===T.activeTeamId);
  if(!team) return;
  const p=team.players.find(x=>x.id===playerId);
  if(!p) return;
  const dn=playerDisplayName(p);
  const idx=S.names.indexOf(dn);
  if(idx!==-1){
    S.names.splice(idx,1);
  } else {
    const emptyIdx=S.names.findIndex(n=>!n.trim());
    if(emptyIdx!==-1) S.names[emptyIdx]=dn;
    else S.names.push(dn);
  }
  renderSetup(true);
}

function toggleSquadChip(name, jersey){
  const fullName=`${name} ${jersey}`;
  const idx=S.names.indexOf(fullName);
  if(idx!==-1){ S.names.splice(idx,1); }
  else {
    const emptyIdx=S.names.findIndex(n=>!n.trim());
    if(emptyIdx!==-1) S.names[emptyIdx]=fullName;
    else S.names.push(fullName);
  }
  renderSetup(true);
}

function updateRosterCount(){

function toggleH2Preset(i){

// ═══════════════════════════════════════════
// PERSISTENCE — save/restore game state
// ═══════════════════════════════════════════
const SAVE_KEY = 'squadmgr_v1';

function stateToJSON(){
  // Sets aren't JSON-serialisable, convert to arrays
  return JSON.stringify({
    phase: S.phase,
    names: S.names,
    opponent: S.opponent||'',
    h1Dur:S.h1Dur, h2Dur:S.h2Dur,
    h1Int:S.h1Int, h2Int:S.h2Int,
    h1Sps:S.h1Sps, h2Sps:S.h2Sps,
    useH2Preset: S.useH2Preset,
    h2PresetIds: [...S.h2PresetIds],
    useFinalPreset: S.useFinalPreset,
    finalPresetIds: [...S.finalPresetIds],
    useSubPlan: S.useSubPlan,
    showRecommended: S.showRecommended,
    showPlanned: S.showPlanned,
    priorityPlayerIds: [...S.priorityPlayerIds],
    subPlan: {
      h1: (S.subPlan.h1||[]).map(s=>s?{off:[...s.off],on:[...s.on]}:null),
      h2: (S.subPlan.h2||[]).map(s=>s?{off:[...s.off],on:[...s.on]}:null),
    },
    planSubIdx: S.planSubIdx,
    players: S.players,
    gameTime: S.gameTime,
    halfTime: S.halfTime,
    subCountdown: S.subCountdown,
    alertState: S.alertState,
    subLog: S.subLog,
  });
}

function saveState(){
  try { localStorage.setItem(SAVE_KEY, stateToJSON()); } catch(_){}
}

function loadState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(!d||!d.players) return;

    S.phase = d.phase||'setup';
    S.names = d.names||['','','','',''];
    S.opponent = d.opponent||'';
    S.h1Dur=d.h1Dur||20; S.h2Dur=d.h2Dur||20;
    // Migrate: old saves stored minutes (e.g. 3), new stores seconds (e.g. 180)
    S.h1Int=d.h1Int>60?d.h1Int:(d.h1Int||3)*60;
    S.h2Int=d.h2Int>60?d.h2Int:(d.h2Int||3)*60;
    S.h1Sps=d.h1Sps||2;  S.h2Sps=d.h2Sps||2;
    S.useH2Preset=d.useH2Preset||false;
    S.h2PresetIds=new Set(d.h2PresetIds||[]);
    S.useFinalPreset=d.useFinalPreset||false;
    S.finalPresetIds=new Set(d.finalPresetIds||[]);
    S.useSubPlan=d.useSubPlan||false;
    S.showRecommended=d.showRecommended!==false;
    S.showPlanned=d.showPlanned!==false;
    S.priorityPlayerIds=new Set(d.priorityPlayerIds||[]);
    S.planSubIdx=d.planSubIdx||0;
    S.subPlan={
      h1: (d.subPlan&&d.subPlan.h1||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
      h2: (d.subPlan&&d.subPlan.h2||[]).map(s=>s?{off:new Set(s.off),on:new Set(s.on)}:null),
    };
    S.players=d.players||[];
    S.gameTime=d.gameTime||0;
    S.halfTime=d.halfTime||0;
    S.subCountdown=d.subCountdown||0;
    S.alertState=d.alertState||null;
    prevAlert=d.alertState||null;
    S.subLog=d.subLog||[];
    S.isRunning=false; // never auto-resume
    S.selCourt=new Set();
    S.selBench=new Set();
    S.htOnCourt=new Set();

    // If we were mid-game, surface the continue button
    if(['h1','h2','halftime'].includes(S.phase)){
      S.savedGame={
        phase:S.phase, players:S.players, gameTime:S.gameTime,
        halfTime:S.halfTime, subCountdown:S.subCountdown,
        alertState:S.alertState, h1Dur:S.h1Dur, h2Dur:S.h2Dur,
        h1Int:S.h1Int, h2Int:S.h2Int, h1Sps:S.h1Sps, h2Sps:S.h2Sps,
        subLog:S.subLog,
      };
      S.phase='setup';
    }
  } catch(_){}
}

// Auto-save every 5 seconds during a game and after every action
let autoSaveTimer=null;
function startAutoSave(){
  if(autoSaveTimer) return; // already running
  autoSaveTimer=setInterval(saveState,5000);
}
function stopAutoSave(){ clearInterval(autoSaveTimer); autoSaveTimer=null; }

// Patch key actions to auto-save
const _startGame=startGame;
window.startGame=function(){ _startGame(); saveState(); startAutoSave(); };
const _endHalf=endHalf;
window.endHalf=function(){ _endHalf(); saveState(); stopAutoSave(); };
const _startSecondHalf=startSecondHalf;
window.startSecondHalf=function(){ _startSecondHalf(); saveState(); startAutoSave(); };
const _endGame=endGame;
window.endGame=function(){ _endGame(); saveState(); stopAutoSave(); };
const _commitSub=commitSub;
window.commitSub=function(){ _commitSub(); saveState(); };
const _toggleFoul=toggleFoul;
window.toggleFoul=function(pid,dot){ _toggleFoul(pid,dot); saveState(); };
const _newGame=newGame;
window.newGame=function(){ _newGame(); saveState(); stopAutoSave(); };

function dismissBanner(persist){
  document.getElementById('install-banner').style.display='none';
  if(persist) try{ localStorage.setItem('sqm_installed','1'); }catch(_){}
}

function maybeShowBanner(){
  // Don't show if already in standalone mode or dismissed before
  const standalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;
  if(standalone) return;
  try{ if(localStorage.getItem('sqm_installed')) return; }catch(_){}
  // Only show in Safari on iOS
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if(!isIOS) return;
  setTimeout(()=>{ document.getElementById('install-banner').style.display='block'; }, 2500);
}

// ═══════════════════════════════════════════
// SERVICE WORKER (works when served over http/https, skipped on file://)
// ═══════════════════════════════════════════
function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  if(location.protocol === 'file:') return; // can't register on file://
  const swCode = `
const CACHE='squadmgr-v1';
const FILES=['/'];
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll(FILES)).then(()=>self.skipWaiting())
));
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(keys=>Promise.all(
    keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))
  )).then(()=>self.clients.claim())
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request))
));`;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }catch(_){}
}
